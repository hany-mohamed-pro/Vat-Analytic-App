        // --- UTILITY & MATH FUNCTIONS ---
        const levenshtein = (a, b) => {
          const matrix = Array.from({ length: a.length + 1 }, () => new Array(b.length + 1).fill(0));
          for (let i = 0; i <= a.length; i++) matrix[i][0] = i;
          for (let j = 0; j <= b.length; j++) matrix[0][j] = j;
          for (let i = 1; i <= a.length; i++) {
            for (let j = 1; j <= b.length; j++) {
              const cost = a[i - 1] === b[j - 1] ? 0 : 1;
              matrix[i][j] = Math.min(matrix[i - 1][j] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j - 1] + cost);
            }
          }
          return matrix[a.length][b.length];
        };

        const isSimilarName = (a, b) => {
          if (!a || !b) return false;
          const cleanA = String(a).toLowerCase().replace(/^(卮乇賰丞|賲丐爻爻丞|賲噩賲賵毓丞|賲賰鬲亘|賲氐賳毓|賲丨賱|賲乇賰夭|賲毓乇囟)\s+/g, '').replace(/[^a-z0-9\u0600-\u06FF]/gi, '');
          const cleanB = String(b).toLowerCase().replace(/^(卮乇賰丞|賲丐爻爻丞|賲噩賲賵毓丞|賲賰鬲亘|賲氐賳毓|賲丨賱|賲乇賰夭|賲毓乇囟)\s+/g, '').replace(/[^a-z0-9\u0600-\u06FF]/gi, '');
          if (cleanA === cleanB) return true;
          if (Math.abs(cleanA.length - cleanB.length) > 3) return false; 
          const distance = levenshtein(cleanA, cleanB);
          const maxLength = Math.max(cleanA.length, cleanB.length);
          return (1 - distance / maxLength) > 0.90; 
        };

        const parseNumber = (val) => {
          if (val === null || val === undefined || val === '') return 0;
          if (typeof val === 'number') return val;
          let str = String(val).replace(/[贍-侃]/g, d => '贍佟佗伲伽佶佴侑侉侃'.indexOf(d));
          str = str.replace(/,/g, ''); 
          const cleanStr = str.replace(/[^\d.-]/g, ''); 
          const parsed = parseFloat(cleanStr);
          return isNaN(parsed) ? 0 : parsed;
        };

        const parseDate = (val) => {
          if (!val) return null;
          if (typeof val === 'number') {
            const d = new Date(Math.round((val - 25569) * 86400 * 1000));
            return isNaN(d.getTime()) ? null : d.toISOString().split('T')[0];
          }
          const d = new Date(val);
          return isNaN(d.getTime()) ? String(val).trim() : d.toISOString().split('T')[0]; 
        };

              addScore('鬲爻賵賷賯 賵丨賲賱丕鬲 廿毓賱丕賳賷丞', 100);
          }

          if (/(賲賱丕亘爻|賯亘毓丕鬲 鬲禺乇噩|胤丕賯賷丞|禺賷丕胤|賷賵賳賷賮賵乇賲|賲乇賷賱丞|鬲賮氐賷賱 夭賷|夭賷 賲賵馗賮賷賳|夭賷 毓賲丕賱)/.test(allText)) {
              addScore('夭賷 毓丕賲賱賷賳 賵賲賴賲丕鬲 毓賲賱', 100);
          }

          if (/(鬲噩丿賷丿 賰丕乇鬲|乇禺氐丞|賳賯丕胤 賲丿丿|賲丿丿|賯賵賶|賲賯賷賲|噩賵丕夭丕鬲|鬲兀卮賷乇丞|乇爻賵賲 丨賰賵賲賷丞|睾乇賮丞 鬲噩丕乇賷丞|爻噩賱 鬲噩丕乇賷|亘賱丿賷丞|夭賰丕丞|囟乇賷亘丞)/.test(allText) && !/(鬲兀賲賷賳丕鬲 丕噩鬲賲丕毓賷丞|gosi|賯賷賲丞 賲囟丕賮丞|vat)/.test(allText)) {
              addScore('乇爻賵賲 賵賲丿賮賵毓丕鬲 丨賰賵賲賷丞', 100);
          }

          if (/(賲胤亘賵毓丕鬲|賵乇賯|兀賯賱丕賲|丕賯賱丕賲|丨亘乇|賯乇胤丕爻賷丞|賲賰鬲亘賷丞|兀丿賵丕鬲 賲賰鬲亘賷丞|兀禺鬲丕賲|丿賮丕鬲乇)/.test(allText)) {
              addScore('兀丿賵丕鬲 賵賲賴賲丕鬲 賲賰鬲亘賷丞 (賯乇胤丕爻賷丞 賵賲胤亘賵毓丕鬲)', 100);
          }

          if (/(氐丿賯丞|氐丿賯丕鬲|鬲亘乇毓|噩賲毓賷丞|兀賵賯丕賮|兀賷鬲丕賲|廿睾丕孬丞|廿丨爻丕賳)/.test(allText)) {
              addScore('鬲亘乇毓丕鬲 賵賲爻丕賴賲丕鬲 賲噩鬲賲毓賷丞', 100);
          }

          if (/(鬲丿乇賷亘|丿賵乇丞|賲毓賴丿|賵乇卮丞 毓賲賱|鬲胤賵賷乇 賲賵馗賮賷賳|training)/.test(allText)) {
              addScore('鬲丿乇賷亘 賵鬲胤賵賷乇 賰賵丕丿乇', 100);
          }
          if (/(兀亘丨丕孬|亘丨孬 賵鬲胤賵賷乇|r&d|research & development|development)/.test(allText) && !/(毓賯丕乇|賲亘丕賳賷)/.test(allText)) {
              addScore('賲氐乇賵賮丕鬲 賵兀亘丨丕孬 賵鬲胤賵賷乇 (R&D)', 100);
          }

          if (/(亘賳賰|賲氐乇賮|乇爻賵賲 鬲丨賵賷賱|毓賲賵賱丞|賲丿賶|賮賷夭丕|賲丕爻鬲乇賰丕乇丿)/.test(allText)) {
              addScore('乇爻賵賲 亘賳賰賷丞 賵禺丿賲丕鬲 賲丕賱賷丞', 100);
          }
          if (/(卮丨賳|鬲賵氐賷賱|賱賵噩爻鬲賷|丕乇丕賲賰爻|爻賲爻丕|噩丕賴夭|賴賳賯乇爻鬲賷卮賳|賲乇爻賵賱|丿賷賳丕|賵賳卮|爻胤丨丞)/.test(allText) || (/(鬲兀噩賷乇|丕賷噩丕乇)/.test(allText) && /(丿賷賳丕|卮丕丨賳丞|爻賷丕乇丞)/.test(allText))) {
              addScore('賳賯賱 賵禺丿賲丕鬲 賱賵噩爻鬲賷丞 賵鬲賵氐賷賱', 100);
          }

          if (/(亘胤丕乇賷丞)/.test(allText) && !/(噩賵丕賱|爻賷丕乇丞|賲乇賰亘丞)/.test(allText)) {
              addScore('兀丿賵丕鬲 賵賲賴賲丕鬲 丕爻鬲賴賱丕賰賷丞 賲鬲賳賵毓丞', 50);
          }

          let bestCategory = '鬲噩丕乇丞 賵鬲賵乇賷丿丕鬲 賲鬲賳賵毓丞 毓丕賲丞';
          let max = 0;
          for (const [cat, score] of Object.entries(scores)) {
              if (score > max) {
                  max = score;
                  bestCategory = cat;
              }
          }

          if (max === 0 && /(鬲噩丕乇丞|鬲賵乇賷丿|卮乇賰丞|賲丐爻爻丞)/.test(nameText)) {
              return '鬲噩丕乇丞 賵鬲賵乇賷丿丕鬲 賲鬲賳賵毓丞 毓丕賲丞';
          } else if (max === 0) {
              return '賲氐乇賵賮丕鬲 鬲卮睾賷賱賷丞 賲鬲賳賵毓丞';
          }

          return bestCategory;
        };

        // --- SMART HEURISTIC DATA PROFILING ---
        const detectSchema = (keys, sampleData) => {
          const schema = {
            Supplier_Name: null, Supplier_TaxID: null, Invoice_Number: null, Invoice_Date: null, 
            Net_Amount: null, Taxable_Amount: null, NonTaxable_Amount: null, 
            VAT_Amount: null, Total_Amount: null, Item_Description: null
          };

          const scores = {};
          keys.forEach(k => {
            scores[k] = { supplier: 0, taxId: 0, invNum: 0, date: 0, total: 0, net: 0, vat: 0, taxable: 0, nonTaxable: 0, desc: 0 };
          });
          
          keys.forEach(k => {
            const lower = String(k).toLowerCase().trim();
            if (/(賲賵乇丿|丕爻賲|卮乇賰丞|噩賴丞|丨爻丕亘|丿丕卅賳|vendor|supplier|merchant)/i.test(lower) && !/(乇賯賲|id|no)/i.test(lower)) scores[k].supplier += 50;
            if (/(亘賷丕賳|鬲賮丕氐賷賱|賵氐賮|氐賳賮|賲丕丿丞|賳賵毓|description|item|丕賱亘賷丕賳)/i.test(lower) && !/(賲賵乇丿|丕爻賲|噩賴丞|丨爻丕亘|乇賯賲|鬲丕乇賷禺|賲亘賱睾)/i.test(lower)) scores[k].desc += 50;
            if (/(乇賯賲.*囟乇賷亘|囟乇賷亘.*乇賯賲|鬲爻噩賷賱.*囟乇賷亘|鬲毓乇賷賮賷|tax id|vat id|vat no|tin|vat number|vat reg)/i.test(lower)) scores[k].taxId += 50;
            if (/(賮丕鬲賵乇丞|賲爻鬲賳丿|賲乇噩毓|賯賷丿|invoice|inv|ref)/i.test(lower) && !/(鬲丕乇賷禺|date|丕噩賲丕賱賷|賯賷賲丞|賲亘賱睾)/i.test(lower)) scores[k].invNum += 50;
            if (/(鬲丕乇賷禺|賵賯鬲|date|time)/i.test(lower)) scores[k].date += 50;
            if (/(丕噩賲丕賱賷|廿噩賲丕賱賷|賲噩賲賵毓|丿丕卅賳|total|gross)/i.test(lower) && !/(氐丕賮賷|禺丕囟毓|亘丿賵賳)/i.test(lower)) scores[k].total += 50;
            if (/(亘丿賵賳 囟乇賷亘丞|睾賷乇 禺丕囟毓|賲毓賮賶|氐賮乇賷丞|non-taxable|exempt)/i.test(lower)) scores[k].nonTaxable += 50;
            if (/(禺丕囟毓|taxable)/i.test(lower) && !/(睾賷乇|亘丿賵賳|non|exempt)/i.test(lower)) scores[k].taxable += 50;
            if (/(囟乇賷亘丞|tax|vat)/i.test(lower) && !/(乇賯賲|賳爻亘丞|id|tax id|vat id|亘丿賵賳|禺丕囟毓|睾賷乇|賲毓賮賶)/i.test(lower)) scores[k].vat += 50;
            if (/(氐丕賮賷|net|sub|basic|賲亘賱睾|賯賷賲丞|amount)/i.test(lower) && !/(丕噩賲丕賱賷|廿噩賲丕賱賷|賲噩賲賵毓|囟乇賷亘丞|tax|vat|total|gross|禺丕囟毓|亘丿賵賳|亘賷丕賳)/i.test(lower)) scores[k].net += 30;
          });

          sampleData.slice(0, 20).forEach(row => {
            keys.forEach(k => {
              const val = row[k];
              if (val === null || val === undefined || val === '') return;
              const strVal = String(val).replace(/\.0+$/, '').trim(); 
              if (/^\d{15}$/.test(strVal)) scores[k].taxId += 10;
              if (/^(卮乇賰丞|賲丐爻爻丞|賲噩賲賵毓丞|賲賰鬲亘|賲氐賳毓|氐賷丿賱賷丞|賲乇賰夭)/.test(strVal)) scores[k].supplier += 10;
              if (val instanceof Date || /^\d{4}[\/\-]\d{2}[\/\-]\d{2}/.test(strVal) || /^\d{2}[\/\-]\d{2}[\/\-]\d{4}/.test(strVal)) scores[k].date += 10;
              if (/^[A-Z0-9\-\/]{3,12}$/i.test(strVal) && /[0-9]/.test(strVal) && !/^\d{15}$/.test(strVal)) scores[k].invNum += 2;
            });
          });

          const assignBest = (schemaKey, scoreKey, threshold) => {
            let bestKey = null;
            let maxScore = threshold;
            keys.forEach(k => {
              if (scores[k][scoreKey] > maxScore) {
                maxScore = scores[k][scoreKey];
                bestKey = k;
              }
            });
            if (bestKey) {
              schema[schemaKey] = bestKey;
              scores[bestKey] = { supplier: 0, taxId: 0, invNum: 0, date: 0, total: 0, net: 0, vat: 0, taxable: 0, nonTaxable: 0, desc: 0 };
            }
          };

          assignBest('Supplier_TaxID', 'taxId', 15); 
          assignBest('VAT_Amount', 'vat', 20);
          assignBest('Taxable_Amount', 'taxable', 20);
          assignBest('NonTaxable_Amount', 'nonTaxable', 20);
          assignBest('Total_Amount', 'total', 20);
          assignBest('Net_Amount', 'net', 20);
          assignBest('Invoice_Date', 'date', 15);
          assignBest('Item_Description', 'desc', 20); 
          assignBest('Supplier_Name', 'supplier', 15); 
          assignBest('Invoice_Number', 'invNum', 20);

          if (!schema.Supplier_Name && schema.Item_Description) {
             schema.Supplier_Name = schema.Item_Description;
          }

          return schema;
        };

        const processFinancialData = (rawData) => {
          if (!rawData || rawData.length === 0) return null;

          const headers = Object.keys(rawData[0] || {});
          const schema = detectSchema(headers, rawData);

          let cleanData = rawData.map((row, index) => {
            const rawSup = schema.Supplier_Name ? row[schema.Supplier_Name] : null;
            const rawTaxId = schema.Supplier_TaxID ? String(row[schema.Supplier_TaxID] || '').replace(/\.\d+$/, '').trim() : '';
            const rawDesc = schema.Item_Description ? row[schema.Item_Description] : '';
            
            let total = schema.Total_Amount ? parseNumber(row[schema.Total_Amount]) : 0;
            let vat = schema.VAT_Amount ? parseNumber(row[schema.VAT_Amount]) : 0;
            let taxable = schema.Taxable_Amount ? parseNumber(row[schema.Taxable_Amount]) : 0;
            let nonTaxable = schema.NonTaxable_Amount ? parseNumber(row[schema.NonTaxable_Amount]) : 0;
            let net = schema.Net_Amount ? parseNumber(row[schema.Net_Amount]) : 0;

            if (taxable === 0 && nonTaxable === 0 && net > 0) {
              if (vat === 0) {
                 nonTaxable = net;
              } else {
                 let calculatedTaxable = vat / 0.15;
                 if (Math.abs(net - calculatedTaxable) <= 1) { 
                    taxable = net;
                 } else if (calculatedTaxable < net) {
                    taxable = parseFloat(calculatedTaxable.toFixed(2));
                    nonTaxable = parseFloat((net - taxable).toFixed(2));
                 } else {
                    taxable = net; 
                 }
              }
            }
            
            if (taxable > 0 || nonTaxable > 0) {
              net = parseFloat((taxable + nonTaxable).toFixed(2));
            }
            if (total === 0 && net > 0) {
              total = parseFloat((net + vat).toFixed(2));
            }

            return {
              _originalIndex: index + 2,
              Raw_Supplier: rawSup ? String(rawSup).trim() : '睾賷乇_賲丿乇噩',
              Supplier_ID: null,
              Supplier_Normalized_Name: null,
              Supplier_TaxID: rawTaxId,
              Invoice_Number: (schema.Invoice_Number && row[schema.Invoice_Number]) ? String(row[schema.Invoice_Number]).trim() : '亘丿賵賳 乇賯賲',
              Invoice_Date: schema.Invoice_Date ? parseDate(row[schema.Invoice_Date]) : '睾賷乇 賲丨丿丿',
              Item_Description: rawDesc ? String(rawDesc).trim() : '', 
              Category: null, 
              Net_Amount: net,
              Taxable_Amount: taxable,
              NonTaxable_Amount: nonTaxable,
              VAT_Amount: vat,
              Total_Amount: total,
              Anomalies: [],
              Confidence_Score: 100
            };
          }).filter(row => row.Total_Amount > 0 || row.Net_Amount > 0); 

          if (cleanData.length === 0) return null;

          const uniqueSuppliers = [...new Set(cleanData.map(d => d.Raw_Supplier))];
          const supplierMapping = {};
          let currentId = 1;

          uniqueSuppliers.forEach(supplier => {
            if (supplierMapping[supplier]) return; 
            const similar = uniqueSuppliers.filter(s => !supplierMapping[s] && isSimilarName(supplier, s));
            const canonicalName = similar.sort((a, b) => b.length - a.length)[0]; 
            const supId = `SUP-${String(currentId).padStart(4, '0')}`;
            
            similar.forEach(s => {
              supplierMapping[s] = { id: supId, name: canonicalName };
            });
            currentId++;
          });

          cleanData.forEach(row => {
            const mapping = supplierMapping[row.Raw_Supplier];
            row.Supplier_ID = mapping.id;
            row.Supplier_Normalized_Name = mapping.name;
            row.Category = getCategory(mapping.name, row.Item_Description);
          });

          const invoiceRegistry = new Set();
          cleanData.forEach(row => {
            const calculatedTotal = row.Taxable_Amount + row.NonTaxable_Amount + row.VAT_Amount;
            if (Math.abs(calculatedTotal - row.Total_Amount) > 2) {
              row.Anomalies.push("鬲賳亘賷賴: (丕賱兀爻丕爻 + 丕賱囟乇賷亘丞) 賱丕 賷鬲胤丕亘賯 賲毓 丕賱廿噩賲丕賱賷");
              row.Confidence_Score -= 20;
            }
            
            const invKey = `${row.Supplier_ID}-${row.Invoice_Number}`;
            if (invoiceRegistry.has(invKey) && row.Invoice_Number !== '亘丿賵賳 乇賯賲') {
              row.Anomalies.push("乇賯賲 賲爻鬲賳丿 賲賰乇乇 賱賳賮爻 丕賱賲賵乇丿");
              row.Confidence_Score -= 30;
            }
            invoiceRegistry.add(invKey);
          });

          const supplierProfiles = {};
          cleanData.forEach(row => {
            if (!supplierProfiles[row.Supplier_ID]) {
              supplierProfiles[row.Supplier_ID] = {
                id: row.Supplier_ID,
                name: row.Supplier_Normalized_Name,
                taxId: row.Supplier_TaxID, 
                categoriesSet: new Set(), 
                invoiceCount: 0,
                totalNet: 0,
                totalTaxableNet: 0,
                totalNonTaxableNet: 0,
                totalVAT: 0,
                totalSpend: 0,
                anomalies: 0
              };
            }
            
            if (!supplierProfiles[row.Supplier_ID].taxId && row.Supplier_TaxID) {
               supplierProfiles[row.Supplier_ID].taxId = row.Supplier_TaxID;
            }
            
            supplierProfiles[row.Supplier_ID].categoriesSet.add(row.Category);

            supplierProfiles[row.Supplier_ID].invoiceCount += 1;
            supplierProfiles[row.Supplier_ID].totalNet += row.Net_Amount;
            supplierProfiles[row.Supplier_ID].totalTaxableNet += row.Taxable_Amount;
            supplierProfiles[row.Supplier_ID].totalNonTaxableNet += row.NonTaxable_Amount;
            supplierProfiles[row.Supplier_ID].totalVAT += row.VAT_Amount;
            supplierProfiles[row.Supplier_ID].totalSpend += row.Total_Amount;
            if (row.Anomalies.length > 0) supplierProfiles[row.Supplier_ID].anomalies += 1;
          });

          const finalSuppliers = Object.values(supplierProfiles).map(profile => {
             profile.categoryString = Array.from(profile.categoriesSet).join(" 貙 ");
             profile.categoriesArray = Array.from(profile.categoriesSet);
             delete profile.categoriesSet; 
             return profile;
          }).sort((a, b) => b.totalSpend - a.totalSpend);

          return {
            schema,
            records: cleanData,
            suppliers: finalSuppliers
          };
        };

        // --- UI COMPONENTS ---
        const Card = ({ title, value, subtitle, icon: IconComp, color = "blue" }) => {
          const colorMap = {
            blue: "bg-blue-50 text-blue-600 border-blue-100",
            emerald: "bg-emerald-50 text-emerald-600 border-emerald-100",
            indigo: "bg-indigo-50 text-indigo-600 border-indigo-100",
            red: "bg-red-50 text-red-600 border-red-100"
          };

          return (
            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-start space-x-4 space-x-reverse transition-all hover:shadow-md">
              <div className={`p-3 rounded-lg ${colorMap[color]}`}>
                <IconComp className="w-6 h-6" />
              </div>
              <div>
                <p className="text-sm font-medium text-slate-500 mb-1">{title}</p>
                <h3 className="text-2xl font-bold text-slate-800">{value}</h3>
                {subtitle && <p className="text-xs text-slate-400 mt-1">{subtitle}</p>}
              </div>
            </div>
          );
        };

        // --- MAIN APPLICATION ---
        function App() {
          const [status, setStatus] = useState('loading_script'); 
          const [activeTab, setActiveTab] = useState('dashboard');
          const [auditMode, setAuditMode] = useState(false);
          const [data, setData] = useState({ records: [], suppliers: [], schema: null });
          const [searchTerm, setSearchTerm] = useState('');
          const [expandedSuppliers, setExpandedSuppliers] = useState({});
          const [exportMenuOpen, setExportMenuOpen] = useState(false);
          
          // State for Supplier-Level Manual Override Editing (Existing)
          const [editCatData, setEditCatData] = useState({ supId: null, value: '' });

          // NEW: State for Sub-Category Manual Override Editing
          const [editSubCat, setEditSubCat] = useState({ supId: null, oldCat: '', value: '' });

          // NEW: State for toggling Sub-Categories
          const [collapsedSubCats, setCollapsedSubCats] = useState({});

          useEffect(() => {
            const checkLibs = setInterval(() => {
              if (window.XLSX && window.html2pdf) {
                setStatus('ready');
                clearInterval(checkLibs);
              }
            }, 100);
            return () => clearInterval(checkLibs);
          }, []);

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file || !window.XLSX) return;

            setStatus('processing');
            const reader = new FileReader();
            reader.onload = (evt) => {
              try {
                const arrayBuffer = evt.target.result;
                const wb = window.XLSX.read(arrayBuffer, { type: 'array', cellDates: true });
                const wsname = wb.SheetNames[0];
                const ws = wb.Sheets[wsname];
                
                const rawArray = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
                
                let headerRowIndex = 0;
                let maxScore = 0;
                
                for (let i = 0; i < Math.min(30, rawArray.length); i++) {
                   const row = rawArray[i];
                   if (!row) continue;
                   let score = 0;
                   row.forEach(cell => {
                     const str = String(cell).toLowerCase();
                     if (/(賲賵乇丿|亘賷丕賳|鬲賮丕氐賷賱|賵氐賮|氐賳賮|乇賯賲|鬲丕乇賷禺|賲亘賱睾|丕噩賲丕賱賷|氐丕賮賷|丿丕卅賳|賲丿賷賳|囟乇賷亘丞|禺丕囟毓|囟乇賷亘賷)/.test(str) || /^\d{15}$/.test(str)) score++;
                   });
                   if (score > maxScore) {
                     maxScore = score;
                     headerRowIndex = i;
                   }
                }

                const headers = rawArray[headerRowIndex] || [];
                const rawData = [];
                for (let i = headerRowIndex + 1; i < rawArray.length; i++) {
                   const row = rawArray[i];
                   if (!row || !row.length) continue;
                   if (row.every(cell => cell === null || cell === '')) continue; 

                   const obj = {};
                   headers.forEach((h, j) => {
                     if (h) obj[h] = row[j];
                   });
                   rawData.push(obj);
                }

                if (rawData.length === 0) {
                  alert("丕賱賲賱賮 賱丕 賷丨鬲賵賷 毓賱賶 亘賷丕賳丕鬲 兀賵 賱賲 賳鬲賲賰賳 賲賳 丕賱毓孬賵乇 毓賱賶 噩丿賵賱 丕賱亘賷丕賳丕鬲.");
                  setStatus('ready');
                  return;
                }
                
                const processed = processFinancialData(rawData);
                if (processed) {
                  setData(processed);
                  setExpandedSuppliers({});
                  setStatus('done');
                } else {
                  alert("鬲賲 賯乇丕亍丞 丕賱賲賱賮 賵賱賰賳 賱賲 賳鬲賲賰賳 賲賳 丕賱毓孬賵乇 毓賱賶 兀毓賲丿丞 鬲禺氐 (丕賱賲賵乇丿賷賳貙 丕賱賲亘丕賱睾貙 丕賱禺). 賷乇噩賶 丕賱鬲丨賯賯 賲賳 丕賱賲賱賮.");
                  setStatus('ready');
                }
              } catch (err) {
                console.error(err);
                alert("丨丿孬 禺胤兀 兀孬賳丕亍 鬲丨賱賷賱 丕賱廿賰爻賷賱. 鬲兀賰丿 賲賳 兀賳 丕賱賲賱賮 睾賷乇 鬲丕賱賮.");
                setStatus('ready');
              }
            };
            reader.readAsArrayBuffer(file);
          };

                   {anomaliesCount > 0 && (

                              <tr style={{ backgroundColor: '#fef2f2', color: '#991b1b' }}>
                                 <th style={{ padding: '10px', border: '1px solid #fca5a5' }}>丕賱賲賵乇丿</th>
                                 <th style={{ padding: '10px', border: '1px solid #fca5a5' }}>乇賯賲 丕賱賮丕鬲賵乇丞</th>
                                 <th style={{ padding: '10px', border: '1px solid #fca5a5' }}>賵氐賮 丕賱禺胤兀 / 丕賱鬲賳丕賯囟</th>

                {/* --- END HIDDEN PDF REPORT TEMPLATE --- */}

                <aside className="w-full md:w-64 bg-slate-900 text-slate-300 flex flex-col transition-all shrink-0">

                      { id: 'grouped_purchases', label: '爻噩賱 丕賱賲卮鬲乇賷丕鬲 丕賱賲噩賲毓', icon: Layers },

                         '丕賱鬲丿賯賷賯 賵丕賰鬲卮丕賮 丕賱鬲賳丕賯囟丕鬲 丕賱賲丨丕爻亘賷丞'}

                      </p>
                    </div>
                    
                    <div className="flex items-center space-x-4 space-x-reverse">

                        <Search className="w-5 h-5 text-slate-400 absolute right-3 top-1/2 transform -translate-y-1/2" />
                        <input 
                          type="text" 
                          placeholder="丕亘丨孬 毓賳 賲賵乇丿貙 亘賷丕賳貙 乇賯賲 囟乇賷亘賷貙 鬲賵噩賷賴..." 
                          value={searchTerm}
                          onChange={(e) => setSearchTerm(e.target.value)}
                          className="pr-10 pl-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 w-72 bg-slate-50"
                        />
                      </div>
                      
                      {/* Export Dropdown Button */}
                      <div className="relative">
                        <button 
                          onClick={() => setExportMenuOpen(!exportMenuOpen)}
                          className="flex items-center px-4 py-2 bg-slate-800 text-white rounded-lg font-bold hover:bg-slate-700 transition-colors shadow-sm border border-slate-700 text-sm"
                        >
                          <Download className="w-4 h-4 ml-2" /> 鬲氐丿賷乇
                        </button>
                        
                        {exportMenuOpen && (
                          <div className="absolute left-0 mt-2 w-48 bg-white border border-slate-200 rounded-xl shadow-xl overflow-hidden z-50">

                  <div className="p-8">
                    {/* DASHBOARD TAB */}

                          <Card title="丕賱廿噩賲丕賱賷 丕賱賰賱賷 賱賱毓賲賱賷丕鬲" value={formatCurrency(totalSpend)} icon={TrendingUp} color="indigo" />
                          <Card title="丕賱兀爻丕爻 丕賱禺丕囟毓 賱賱囟乇賷亘丞" value={formatCurrency(totalTaxable)} icon={Layers} color="blue" />

                            <div className="p-3 bg-indigo-50/50 rounded border border-indigo-100"><span className="text-indigo-600 block mb-1">丕賱乇賯賲 丕賱囟乇賷亘賷:</span> <strong className="text-slate-800">{data.schema?.Supplier_TaxID || '賱丕 賷賵噩丿'}</strong></div>

                            <div className="p-3 bg-emerald-50/50 rounded border border-emerald-100"><span className="text-emerald-600 block mb-1">毓賲賵丿 亘丿賵賳 囟乇賷亘丞:</span> <strong className="text-slate-800">{data.schema?.NonTaxable_Amount || '丕爻鬲賳鬲丕噩 丌賱賷'}</strong></div>

                            <div className="p-3 bg-slate-50 rounded border border-slate-100"><span className="text-slate-500 block mb-1">毓賲賵丿 丕賱廿噩賲丕賱賷:</span> <strong className="text-slate-800">{data.schema?.Total_Amount || '賱丕 賷賵噩丿'}</strong></div>
                            <div className="p-3 bg-slate-50 rounded border border-slate-100"><span className="text-slate-500 block mb-1">乇賯賲 丕賱賲爻鬲賳丿:</span> <strong className="text-slate-800">{data.schema?.Invoice_Number || '賱丕 賷賵噩丿'}</strong></div>
                          </div>
                        </div>
                      </div>
                    )}

                    {/* GROUPED PURCHASES TAB */}
                    {activeTab === 'grouped_purchases' && (
                      <div className="space-y-4">
                        <div className="bg-blue-50 text-blue-800 px-5 py-3 rounded-xl border border-blue-100 text-sm flex items-center mb-6">
                          <Activity className="w-5 h-5 ml-2 shrink-0"/>
                          <span>鬲毓丿賷賱 賷丿賵賷 賲鬲賵賮乇: 賷賲賰賳賰 丕賱丌賳 丕賱囟睾胤 毓賱賶 兀賷賯賵賳丞 丕賱鬲毓丿賷賱 亘噩賵丕乇 丕賱鬲氐賳賷賮 丕賱賮乇毓賷 賱鬲睾賷賷乇 鬲賵噩賷賴 丕賱賮賵丕鬲賷乇 丕賱賲賳丿乇噩丞 鬲丨鬲賴 亘卮賰賱 賷丿賵賷 賵亘賰賱 爻賴賵賱丞.</span>
                        </div>
                        
                        {filteredSuppliers.length === 0 ? (
                          <div className="bg-white rounded-xl p-12 text-center text-slate-500 border border-slate-200">賱丕 鬲賵噩丿 賳鬲丕卅噩 鬲胤丕亘賯 亘丨孬賰.</div>
                        ) : (
                          filteredSuppliers.map(sup => {
                            const supplierInvoices = data.records.filter(r => r.Supplier_ID === sup.id);
                            const isExpanded = expandedSuppliers[sup.id];
                            
                            return (
                              <div key={sup.id} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden transition-all duration-200 mb-4">
                                {/* 乇兀爻 丕賱賲賵乇丿 丕賱乇卅賷爻賷 */}
                                <div 
                                  className="bg-slate-800 text-white p-4 flex flex-col md:flex-row md:items-center justify-between cursor-pointer hover:bg-slate-700 transition-colors"
                                  onClick={() => toggleSupplier(sup.id)}
                                >
                                  <div className="flex items-center space-x-4 space-x-reverse mb-3 md:mb-0 w-full md:w-auto">
                                    <div className="bg-indigo-500/20 p-2 rounded-lg shrink-0">
                                      {isExpanded ? <ChevronUp className="w-5 h-5 text-indigo-300" /> : <ChevronDown className="w-5 h-5 text-indigo-300" />}
                                    </div>
                                    <div className="flex-1 min-w-0">
                                      <h3 className="font-bold text-lg">{sup.name}</h3>
                                      <div className="text-indigo-200 text-xs mt-1.5 flex items-center flex-wrap gap-2">
                                        <span className="shrink-0">賲毓乇賮: {sup.id}</span>
                                        {sup.taxId && <span className="border-r border-indigo-400/30 pr-2 shrink-0">囟乇賷亘賷: {sup.taxId}</span>}
                                        
                                        {/* 毓乇囟 丕賱鬲賵噩賷賴丕鬲 丕賱賲丨丕爻亘賷丞 丕賱賲鬲毓丿丿丞 賱賱賲賵乇丿 */}
                                        <span className="border-r border-indigo-400/30 pr-2 flex items-center flex-wrap gap-1">
                                          <Tag className="w-3 h-3 ml-1 text-indigo-300 shrink-0" />
                                          {sup.categoriesArray.map((cat, idx) => (
                                            <span key={idx} className="bg-indigo-500/40 text-white px-2 py-0.5 rounded-md text-[10px] font-bold border border-indigo-400/50 inline-block mb-1">
                                              {cat}
                                            </span>
                                          ))}
                                        </span>
                                      </div>
                                    </div>
                                  </div>
                                  <div className="flex flex-wrap gap-2 md:gap-4 text-sm bg-slate-900/50 p-2.5 rounded-lg justify-center mt-3 md:mt-0 shrink-0">
                                    <div className="text-center px-2"><span className="block text-slate-400 text-xs mb-1">丕賱毓賲賱賷丕鬲</span><strong className="font-bold">{sup.invoiceCount}</strong></div>
                                    <div className="text-center px-2 border-r border-slate-700"><span className="block text-blue-300 text-xs mb-1">丕賱禺丕囟毓 賱賱囟乇賷亘丞</span><strong className="font-bold text-white">{formatCurrency(sup.totalTaxableNet)}</strong></div>
                                    <div className="text-center px-2 border-r border-slate-700"><span className="block text-emerald-300 text-xs mb-1">睾賷乇 禺丕囟毓</span><strong className="font-bold text-white">{formatCurrency(sup.totalNonTaxableNet)}</strong></div>
                                    <div className="text-center px-2 border-r border-slate-700"><span className="block text-slate-400 text-xs mb-1">丕賱囟乇賷亘丞</span><strong className="font-bold">{formatCurrency(sup.totalVAT)}</strong></div>
                                    <div className="text-center px-2 border-r border-slate-700"><span className="block text-slate-400 text-xs mb-1">廿噩賲丕賱賷 丕賱賲爻鬲丨賯</span><strong className="font-bold text-emerald-400">{formatCurrency(sup.totalSpend)}</strong></div>
                                  </div>
                                </div>

                                {/* 丕賱噩丿丕賵賱 丕賱賮乇毓賷丞 (鬲馗賴乇 毓賳丿 賮鬲丨 丕賱賲賵乇丿) */}
                                {isExpanded && (() => {
                                  // 鬲噩賲賷毓 丕賱賮賵丕鬲賷乇 丨爻亘 丕賱鬲氐賳賷賮 丕賱賮乇毓賷
                                  const groupedByCategory = supplierInvoices.reduce((acc, inv) => {
                                      const cat = inv.Category || '睾賷乇 賲氐賳賮';
                                      if (!acc[cat]) acc[cat] = [];
                                      acc[cat].push(inv);
                                      return acc;
                                  }, {});

                                  return (
                                    <div className="bg-slate-50/80 p-4 border-t border-slate-200">
                                        {Object.entries(groupedByCategory).map(([categoryName, invoices], cIdx) => {
                                            const subCatKey = `${sup.id}-${categoryName}`;
                                            const isSubExpanded = !collapsedSubCats[subCatKey];

                                            const catTaxable = invoices.reduce((sum, inv) => sum + inv.Taxable_Amount, 0);
                                            const catNonTaxable = invoices.reduce((sum, inv) => sum + inv.NonTaxable_Amount, 0);
                                            const catVAT = invoices.reduce((sum, inv) => sum + inv.VAT_Amount, 0);
                                            const catTotal = invoices.reduce((sum, inv) => sum + inv.Total_Amount, 0);

                                            return (
                                                <div key={cIdx} className="mb-6 last:mb-0 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                                    
                                                    {/* 乇兀爻 丕賱鬲氐賳賷賮 丕賱賮乇毓賷 (Sub-Category Header) */}
                                                    <div 
                                                        className="bg-indigo-50/60 px-5 py-4 border-b border-indigo-100 flex flex-col gap-3 cursor-pointer hover:bg-indigo-100/60 transition-colors"

                                                    >
                                                        <div className="flex justify-between items-center flex-wrap gap-2">

                                                                <div className="text-indigo-400 shrink-0">
                                                                    {isSubExpanded ? <ChevronUp className="w-5 h-5" /> : <ChevronDown className="w-5 h-5" />}
                                                                </div>
                                                                <div className="bg-indigo-500 rounded p-1.5 ml-1 shrink-0 shadow-sm">
                                                                    <Layers className="w-4 h-4 text-white" />
                                                                </div>
                                                                
                                                                {/* 賲賳胤賯 丕賱鬲毓丿賷賱 丕賱賷丿賵賷 賱賱鬲氐賳賷賮 丕賱賮乇毓賷 */}
                                                                {editSubCat.supId === sup.id && editSubCat.oldCat === categoryName ? (
                                                                    <div className="flex items-center space-x-2 space-x-reverse" onClick={e => e.stopPropagation()}>
                                                                       <input 
                                                                         list="acc-categories"
                                                                         className="text-xs text-slate-800 px-2 py-1.5 rounded border border-indigo-300 focus:outline-none focus:ring-2 focus:ring-emerald-500 w-56 font-medium shadow-inner"
                                                                         value={editSubCat.value}
                                                                         onChange={e => setEditSubCat({...editSubCat, value: e.target.value})}
                                                                         autoFocus
                                                                       />
                                                                       <button onClick={(e) => handleSaveSubCategory(e, sup.id, categoryName)} className="bg-emerald-500 text-white px-3 py-1.5 rounded text-xs font-bold hover:bg-emerald-600 transition-colors shadow-sm">丨賮馗</button>
                                                                       <button onClick={(e) => { e.stopPropagation(); setEditSubCat({supId: null, oldCat: '', value: ''}); }} className="bg-slate-500 text-white px-3 py-1.5 rounded text-xs font-bold hover:bg-slate-600 transition-colors shadow-sm">廿賱睾丕亍</button>
                                                                    </div>
                                                                ) : (
                                                                    <Fragment>
                                                                        <h4 className="font-bold text-indigo-900 text-sm">{categoryName}</h4>
                                                                        <button 
                                                                           onClick={(e) => {
                                                                              e.stopPropagation();
                                                                              setEditSubCat({ supId: sup.id, oldCat: categoryName, value: categoryName });
                                                                           }}
                                                                           className="text-indigo-400 hover:text-indigo-700 bg-white hover:bg-indigo-100 p-1.5 rounded-md transition-colors border border-transparent hover:border-indigo-200 shadow-sm"
                                                                           title="鬲毓丿賷賱 賴匕丕 丕賱鬲氐賳賷賮 丕賱賮乇毓賷 (廿毓丕丿丞 鬲賵噩賷賴)"
                                                                        >
                                                                           <Edit2 className="w-3.5 h-3.5" />
                                                                        </button>
                                                                    </Fragment>
                                                                )}
                                                            </div>
                                                            <span className="bg-white text-indigo-600 px-3 py-1 rounded-full text-xs font-bold border border-indigo-200 shadow-sm">
                                                                {invoices.length} 賮賵丕鬲賷乇
                                                            </span>
                                                        </div>
                                                        
                                                        {/* 賰乇賵鬲 丕賱賲噩丕賲賷毓 丕賱兀賳賷賯丞 (Beautiful Totals Badges) */}
                                                        <div className="flex flex-wrap gap-2 w-full border-t border-indigo-100/70 pt-3 mt-1">
                                                            <div className="bg-blue-50 px-3 py-2 rounded-lg border border-blue-200 flex items-center justify-between min-w-[130px] flex-1 shadow-sm">
                                                                <span className="text-blue-800 text-[11px] font-bold">丕賱禺丕囟毓 賱賱囟乇賷亘丞</span>
                                                                <strong className="text-blue-700 text-sm font-black">{formatCurrency(catTaxable)}</strong>
                                                            </div>
                                                            <div className="bg-emerald-50 px-3 py-2 rounded-lg border border-emerald-200 flex items-center justify-between min-w-[130px] flex-1 shadow-sm">
                                                                <span className="text-emerald-800 text-[11px] font-bold">睾賷乇 禺丕囟毓</span>
                                                                <strong className="text-emerald-700 text-sm font-black">{formatCurrency(catNonTaxable)}</strong>
                                                            </div>
                                                            <div className="bg-slate-100 px-3 py-2 rounded-lg border border-slate-300 flex items-center justify-between min-w-[130px] flex-1 shadow-sm">
                                                                <span className="text-slate-600 text-[11px] font-bold">丕賱囟乇賷亘丞</span>
                                                                <strong className="text-slate-800 text-sm font-black">{formatCurrency(catVAT)}</strong>
                                                            </div>
                                                            <div className="bg-indigo-600 text-white px-3 py-2 rounded-lg flex items-center justify-between min-w-[150px] flex-1 shadow-md">
                                                                <span className="text-indigo-100 text-[12px] font-bold">丕賱廿噩賲丕賱賷</span>
                                                                <strong className="text-white text-sm font-black tracking-wide">{formatCurrency(catTotal)}</strong>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    {/* 噩丿賵賱 丕賱賮賵丕鬲賷乇 丕賱鬲丕亘毓丞 賱賱鬲氐賳賷賮 丕賱賮乇毓賷 */}
                                                    {isSubExpanded && (
                                                      <div className="overflow-x-auto">
                                                          <table className="w-full text-right text-sm">
                                                            <thead className="bg-white text-slate-400 text-[11px] font-bold uppercase border-b border-slate-100">
                                                              <tr>
                                                                <th className="px-5 py-3 w-12 text-center">#</th>
                                                                <th className="px-5 py-3">乇賯賲 丕賱賲爻鬲賳丿</th>
                                                                <th className="px-5 py-3">丕賱亘賷丕賳 / 丕賱賵氐賮</th>
                                                                <th className="px-5 py-3">丕賱鬲丕乇賷禺</th>
                                                                <th className="px-5 py-3 text-left">丕賱賲亘賱睾 丕賱禺丕囟毓</th>
                                                                <th className="px-5 py-3 text-left">亘丿賵賳 囟乇賷亘丞</th>
                                                                <th className="px-5 py-3 text-left">賯賷賲丞 丕賱囟乇賷亘丞</th>
                                                                <th className="px-5 py-3 text-left text-slate-700">廿噩賲丕賱賷 丕賱賮丕鬲賵乇丞</th>
                                                              </tr>
                                                            </thead>
                                                            <tbody className="divide-y divide-slate-50 bg-white">
                                                              {invoices.map((inv, idx) => (
                                                                <tr key={idx} className={`hover:bg-slate-50/80 transition-colors ${inv.Anomalies.length > 0 ? 'bg-red-50/40' : ''}`}>
                                                                  <td className="px-5 py-3 text-center text-slate-400 text-xs">{idx + 1}</td>
                                                                  <td className="px-5 py-3 font-medium text-slate-800">{inv.Invoice_Number}</td>
                                                                  <td className="px-5 py-3 text-slate-600 max-w-[250px]">
                                                                    <div className="truncate font-medium text-slate-700" title={inv.Item_Description}>{inv.Item_Description || '-'}</div>
                                                                  </td>
                                                                  <td className="px-5 py-3 text-slate-600 text-xs">{inv.Invoice_Date}</td>
                                                                  <td className="px-5 py-3 text-left text-blue-600 font-medium">{inv.Taxable_Amount > 0 ? formatCurrency(inv.Taxable_Amount) : '-'}</td>
                                                                  <td className="px-5 py-3 text-left text-emerald-600 font-medium">{inv.NonTaxable_Amount > 0 ? formatCurrency(inv.NonTaxable_Amount) : '-'}</td>
                                                                  <td className="px-5 py-3 text-left text-slate-500">{inv.VAT_Amount > 0 ? formatCurrency(inv.VAT_Amount) : '-'}</td>
                                                                  <td className="px-5 py-3 text-left font-bold text-slate-800">{formatCurrency(inv.Total_Amount)}</td>
                                                                </tr>
                                                              ))}
                                                            </tbody>
                                                          </table>
                                                      </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                  );
                                })()}
                              </div>
                            );
                          })
                        )}
                      </div>
                    )}

                    {/* AUDIT / RAW DATA TAB */}
                    {activeTab === 'audit' && (
                      <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                        <div className="bg-red-50 p-5 border-b border-red-100 flex items-start space-x-3 space-x-reverse">
                          <ShieldAlert className="w-6 h-6 text-red-600 mt-0.5" />
                          <div>
                            <h4 className="text-red-800 font-bold text-lg">爻噩賱 丕賱鬲賳丕賯囟丕鬲 賵丕賱兀禺胤丕亍 丕賱賲丨丕爻亘賷丞</h4>
                            <p className="text-red-600 text-sm mt-1">賷鬲賲 毓乇囟 丕賱爻噩賱丕鬲 丕賱鬲賷 鬲丨鬲賵賷 毓賱賶 兀禺胤丕亍 賮賷 丕賱噩賲毓 (丕賱禺丕囟毓 + 睾賷乇 丕賱禺丕囟毓 + 丕賱囟乇賷亘丞 賱丕 賷爻丕賵賷 丕賱廿噩賲丕賱賷) 兀賵 丕賱賮賵丕鬲賷乇 丕賱賲賰乇乇丞 賱賳賮爻 丕賱賲賵乇丿.</p>
                          </div>
                        </div>

                        <div className="overflow-x-auto">
                          <table className="w-full text-right text-sm">
                            <thead className="bg-slate-50 text-slate-800 font-semibold border-b border-slate-200">
                              <tr>
                                <th className="px-6 py-4">乇賯賲 丕賱賮丕鬲賵乇丞</th>
                                <th className="px-6 py-4">丕賱賲賵乇丿 / 丕賱噩賴丞</th>
                                <th className="px-6 py-4 text-left">丕賱兀爻丕爻 丕賱囟乇賷亘賷</th>
                                <th className="px-6 py-4 text-left">丕賱囟乇賷亘丞</th>
                                <th className="px-6 py-4 text-left">丕賱廿噩賲丕賱賷 (亘丕賱賲賱賮)</th>
                                <th className="px-6 py-4">賳賵毓 丕賱禺胤兀 / 丕賱賲賱丕丨馗丞</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                              {filteredRecords.map((row, idx) => (
                                <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                  <td className="px-6 py-4 font-medium text-slate-800">{row.Invoice_Number}</td>
                                  <td className="px-6 py-4">
                                    <div className="font-medium text-slate-800">{row.Supplier_Normalized_Name}</div>
                                    {row.Supplier_TaxID && <div className="text-xs text-slate-500 mt-0.5">囟乇賷亘賷: {row.Supplier_TaxID}</div>}
                                  </td>
                                  <td className="px-6 py-4 text-left">{formatCurrency(row.Net_Amount)}</td>
                                  <td className="px-6 py-4 text-left text-red-600 font-medium">{formatCurrency(row.VAT_Amount)}</td>
                                  <td className="px-6 py-4 text-left font-bold">{formatCurrency(row.Total_Amount)}</td>
                                  <td className="px-6 py-4">
                                    {row.Anomalies.length > 0 ? (
                                      <div className="flex flex-col space-y-2">
                                        {row.Anomalies.map((anom, i) => (
                                          <span key={i} className="inline-flex items-center text-xs font-bold text-red-700 bg-red-100 px-2 py-1.5 rounded-md">
                                            <AlertTriangle className="w-3.5 h-3.5 ml-1.5" /> {anom}
                                          </span>
                                        ))}
                                      </div>
                                    ) : (
                                      <span className="text-slate-400">-</span>
                                    )}
                                  </td>
                                </tr>
                              ))}
                              {filteredRecords.length === 0 && (
                                <tr>
                                  <td colSpan="6" className="px-6 py-16 text-center text-slate-500">
                                    <CheckCircle className="w-12 h-12 text-emerald-400 mx-auto mb-3 opacity-50"/>
                                    <p className="text-lg">賲賲鬲丕夭! 賱丕 賷賵噩丿 兀賷 兀禺胤丕亍 兀賵 鬲賳丕賯囟丕鬲 賮賷 丕賱毓賲賱賷丕鬲 丕賱賲丕賱賷丞 丕賱賲賰鬲卮賮丞.</p>
                                  </td>
                                </tr>
                              )}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    )}
                  </div>
                </main>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
