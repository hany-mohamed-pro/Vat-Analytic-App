        const Wallet = (p) => <Icon {...p}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></Icon>;
        const FolderOpen = (p) => <Icon {...p}><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></Icon>;
        const AlertTriangle = (p) => <Icon {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></Icon>;
        const BookOpen = (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;

        // --- UTILITY FUNCTIONS ---
        const levenshtein = (a, b) => {
          const matrix = Array.from({ length: a.length + 1 }, () => new Array(b.length + 1).fill(0));
          for (let i = 0; i <= a.length; i++) matrix[i][0] = i;
          for (let j = 0; j <= b.length; j++) matrix[0][j] = j;
          for (let i = 1; i <= a.length; i++) {
            for (let j = 1; j <= b.length; j++) {
              const cost = a[i - 1] === b[j - 1] ? 0 : 1;
              matrix[i][j] = Math.min(matrix[i - 1][j] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j - 1] + cost);
            }
          }
          return matrix[a.length][b.length];
        };

        const isSimilarName = (a, b) => {
          if (!a || !b) return false;
          const cleanA = String(a).toLowerCase().replace(/^(شركة|مؤسسة|مجموعة|مكتب|مصنع|محل|مركز|معرض|عميل|زبون)\s+/g, '').replace(/[^a-z0-9\u0600-\u06FF]/gi, '');
          const cleanB = String(b).toLowerCase().replace(/^(شركة|مؤسسة|مجموعة|مكتب|مصنع|محل|مركز|معرض|عميل|زبون)\s+/g, '').replace(/[^a-z0-9\u0600-\u06FF]/gi, '');
          if (cleanA === cleanB) return true;
          if (Math.abs(cleanA.length - cleanB.length) > 3) return false; 
          const distance = levenshtein(cleanA, cleanB);
          const maxLength = Math.max(cleanA.length, cleanB.length);
          return (1 - distance / maxLength) > 0.90; 
        };

        const parseNumber = (val) => {
          if (val === null || val === undefined || val === '') return 0;
          if (typeof val === 'number') return val;
          let str = String(val).replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d));
          str = str.replace(/,/g, ''); 
          const cleanStr = str.replace(/[^\d.-]/g, ''); 
          const parsed = parseFloat(cleanStr);
          return isNaN(parsed) ? 0 : parsed;
        };

        // Date Parser with Standardized YYYY-MM-DD output
        const parseDate = (val) => {
            if (val === null || val === undefined || val === '') return null;
            const pad = (n) => String(n).padStart(2, '0');
            
            // 1. Handle JavaScript Date object
            if (val instanceof Date) {
                if (isNaN(val.getTime())) return null;
                return `${val.getFullYear()}-${pad(val.getMonth()+1)}-${pad(val.getDate())}`;
            }
            
            // 2. Handle Excel Serial Date (numbers)
            if (typeof val === 'number') {
                const d = new Date(Math.round((val - 25569) * 86400 * 1000));
                return isNaN(d.getTime()) ? null : `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}`;
            }
            
            let str = String(val).trim();
            str = str.replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d)); // Fix Arabic numerals
            
            // Extract the date part aggressively (stop at space or T to remove time like 14:30:00)
            str = str.split(/[ T]/)[0];
            
            // Match YYYY-MM-DD or YYYY/MM/DD
            let match = str.match(/^(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})/);
            if (match) return `${match[1]}-${pad(match[2])}-${pad(match[3])}`;
            
            // Match DD-MM-YYYY or DD/MM/YYYY or MM/DD/YYYY
            match = str.match(/^(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{4})/);
            if (match) {
                let p1 = parseInt(match[1], 10);
                let p2 = parseInt(match[2], 10);
                let year = match[3];
                // if p2 > 12, it must be the day. MM/DD/YYYY
                if (p2 > 12) return `${year}-${pad(p1)}-${pad(p2)}`;
                // if p1 > 12, it must be the day. DD/MM/YYYY
                if (p1 > 12) return `${year}-${pad(p2)}-${pad(p1)}`;
                // default to DD/MM/YYYY (Standard in SA)
                return `${year}-${pad(p2)}-${pad(p1)}`;
            }

            // Match DD-MM-YY or DD/MM/YY
            match = str.match(/^(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{2})$/);
            if (match) {
                let p1 = parseInt(match[1], 10);
                let p2 = parseInt(match[2], 10);
                let year = 2000 + parseInt(match[3], 10);
                if (p2 > 12) return `${year}-${pad(p1)}-${pad(p2)}`;
                if (p1 > 12) return `${year}-${pad(p2)}-${pad(p1)}`;
                return `${year}-${pad(p2)}-${pad(p1)}`;
            }

            // Fallback native
            let d = new Date(str);
            if (!isNaN(d.getTime())) {
                return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; 
            }
            return null; // Force null so it becomes 'غير محدد'
        };

        const formatCurrency = (val) => {
          return new Intl.NumberFormat('ar-SA', { style: 'currency', currency: 'SAR', minimumFractionDigits: 2 }).format(val);
        };

        const isDateInRange = (dateStr, startStr, endStr, filterMonth) => {
            if (!startStr && !endStr && !filterMonth) return true;
            if (!dateStr || dateStr === 'غير محدد') return false; 
            
            if (filterMonth) {
                return dateStr.startsWith(filterMonth);
            } 
            
            if (startStr && dateStr < startStr) return false;
            if (endStr && dateStr > endStr) return false;
            
            return true;
        };

        // --- 🟢 EXPERT EXPENSES TAXONOMY ENGINE ---
        const getExpenseCategory = (name, desc) => {
          const nameText = String(name).toLowerCase();
          const descText = String(desc).toLowerCase();
          const allText = nameText + " " + descText;
          let scores = {};
          const addScore = (cat, basePoints, isDescMatch = false) => { scores[cat] = (scores[cat] || 0) + basePoints + (isDescMatch ? 200 : 0); };
          const check = (regex, cat, basePoints = 100) => {
              if (regex.test(descText)) addScore(cat, basePoints, true);
              else if (regex.test(nameText)) addScore(cat, basePoints, false);
          };

          check(/(لابتوب|حاسب|كمبيوتر|ماك بوك|أجهزة حاسب|سيرفر|ثلاجة عرض|فرن كبير|معدات رأسمالية|laptop|macbook)/, 'أصول ثابتة - أجهزة حاسب آلي ومعدات', 100);
          check(/(ايفون|جوال|ايباد|شاشة|حاسب|لابتوب|سوفتوير|اكس ماكس|برو ماكس|بطارية جوال|بطارية ايفون|خلفية ايفون|شاشة ايفون)/, 'صيانة أجهزة إلكترونية وتقنية', 100);
          check(/(سيار|مركب|دينا|شاحن|اطار|إطار|كفر|بطارية سيارة)/, 'صيانة سيارات ومعدات نقل', 100);
          check(/(مبن|سباك|كهربائي|باب|جدار|أرضي|دهان|ترميم)/, 'صيانة وتشغيل مباني ومرافق', 100);
          
          if (/(وصلة غاز|لي غاز|منظم غاز|محبس غاز|اسطوانة غاز للمطبخ|تمديد غاز|موقد)/.test(allText)) {
              addScore('صيانة وتشغيل مباني ومرافق', 150, true);
              addScore('أدوات ومهمات طعام ومطبخ (تشغيلية)', 120, true);
          }
          
          if (/(صيانة|تصليح|اصلاح|إصلاح|قطع غيار)/.test(allText)) {
              if (!scores['صيانة سيارات ومعدات نقل'] && !scores['صيانة وتشغيل مباني ومرافق'] && !scores['صيانة أجهزة إلكترونية وتقنية']) {
                  addScore('صيانة آلات ومعدات التشغيل', 90, /(صيانة|تصليح|اصلاح|إصلاح|قطع غيار)/.test(descText));
              }
          }
          check(/(خل|فرشلي|فرشلى|زيت طعام|مواد طبخ|ش[كو]+لات|كاكاو|رائب|بيض|دواجن|لحم|دجاج|سمك|فاكه|فواك|برتقال|كرز|ليمون|يانسون|ألبان|البان|قهوة|بن |يمني|مشروب|غازي|مياه|ماء|ثلج|زبدة|قشط|كريم|خفق|حليب|أجبان|جبن|سكر|طحين|دقيق|مكسرات|فستق|لوز|فانيليا|خميرة|عصير|عسل|مربى|تمور|بهار|خضار|خضروات|تموين|غذائي|ألوان|الوان|بودرة)/, 'تكلفة مبيعات - مواد غذائية (خامات ومكونات)', 100);
          check(/(رول|كيك سميك|قاعد|قواعد|أكياس|كيس|شفاف|قالب|قوالب|شريط|ستان|مصاص|تغليف|علب|كرتون|بوكس|ورق زبدة|قصدير|تيك اوي)/, 'تكلفة مبيعات - مواد تعبئة وتغليف ومستلزمات تقديم', 100);
          check(/(شمع|شموع|زينة|ديكور|مجسم|توبر|شجرة|ecualyptus|اكولبتبيس|زهور|ورد|لافندر)/, 'مستلزمات حفلات وزينة وديكور', 90);
          check(/(صيني|صواني|أدوات.*مطبخ|مواد للمطبخ|أدوات.*طعام|أدوات.*كيك|صحون|ملاعق|شوك|سكاكين|قدور|طناجر|أكواب زجاج|عجان|ثلاجة)/, 'أدوات ومهمات طعام ومطبخ (تشغيلية)', 85);
          check(/(إزالة.*مواد|ترسب|جلاية|معقم|مسح|ممسح|ارضيات|نظافة|تنظيف|قفاز|صابون|ديتول|مبيض|منظف|مكنس|مكانيس|أكياس نفاية|كلوركس|صوف القطن|قطن)/, 'مواد وأدوات تنظيف متنوعة', 100);
          check(/(octane|اوكتان|بنزين|ديزل|وقود|محطة|محروقات|غاز|اسطوانة|تعبئة)/, 'مواد بترولية، محروقات وغاز', 100);
          if (/(إستشارات|استشارات|خدمات شهرية|أتعاب|محاماة|مراجعة|تدقيق|محاسب)/.test(allText) && !/(تقني|برنامج)/.test(allText)) addScore('إستشارات وأتعاب مهنية', 110, /(إستشارات|استشارات|خدمات شهرية|أتعاب|محاماة|مراجعة|تدقيق|محاسب)/.test(descText));
          if (/(منصة النمو|fidas|فيداس)/.test(allText)) {
              if (/(استشار|خدمات شهرية)/.test(descText)) addScore('إستشارات وأتعاب مهنية', 120, true);
              else if (/(اشتراك|تجديد|منصة|برنامج)/.test(descText)) addScore('اشتراكات تقنية وبرمجيات (IT & SaaS)', 120, true);
          }
          if (/(اشتراك شهري|كانفا|canva|سحابة|برنامج|تطبيق|نظام|سوفتوير|كلاود|استضافة|دومين|سيرفر|saas|odoo|erp|اشتراك تقني|تجديد اشتراك)/.test(allText) && !/(تأمين|انترنت|اتصالات|استشارات)/.test(allText)) {
              addScore('اشتراكات تقنية وبرمجيات (IT & SaaS)', 90, /(اشتراك شهري|كانفا|canva|سحابة|برنامج|تطبيق|نظام|سوفتوير|كلاود|استضافة|دومين|سيرفر|saas|odoo|erp|اشتراك تقني|تجديد اشتراك)/.test(descText));
          }
          if (/(ايجار|إيجار|عقار|سكن|محل|مستودع)/.test(allText) && !/(سيارة|مركبة|دينا|نقل)/.test(allText)) addScore('مصروفات إيجارات وعقارات', 100, /(ايجار|إيجار|عقار|سكن|محل|مستودع)/.test(descText));
          check(/(تأمين طبي|بوبا|التعاونية|تأمين صحي|ميدغلف|تكافل)/, 'مصروفات تأمين طبي للموظفين', 100);
          check(/(دواء|صيدلية|مستشفى|علاج|مستلزمات طبية)/, 'مصروفات رعاية طبية وأدوية', 100);
          check(/(تأمينات اجتماعية|gosi)/, 'مصروفات التأمينات الاجتماعية (GOSI)', 120);
          if (/(شركة الكهرباء|فاتورة كهرباء|السعودية للكهرباء|كهرباء)/.test(allText) && !/(سباك|صيانة)/.test(allText)) addScore('مصروفات كهرباء', 110, /(فاتورة كهرباء|كهرباء)/.test(descText)); 
          if (/(مياه وطنية|شركة المياه|فاتورة مياه)/.test(allText) && !/(شرب|نوفا|صفا|مياه معدنية|مياه شرب)/.test(allText)) addScore('مصروفات مياه', 110, /(فاتورة مياه|مياه وطنية)/.test(descText));
          check(/(اتصالات|stc|موبايلي|زين|انترنت|فاتورة جوال|فاتورة هاتف)/, 'مصروفات اتصالات وانترنت', 110);
          check(/(حملات|اعلانية|إعلانية|تسويق|سناب|انستقرام|تيك توك|جوجل ادز|ترويج|اعلانات|دعاية|لوحات)/, 'تسويق وحملات إعلانية', 100);
          check(/(ملابس|قبعات تخرج|طاقية|خياط|يونيفورم|مريلة|تفصيل زي|زي موظفين|زي عمال)/, 'زي عاملين ومهمات عمل', 100);
          if (/(تجديد كارت|رخصة|نقاط مدد|مدد|قوى|مقيم|جوازات|تأشيرة|رسوم حكومية|غرفة تجارية|سجل تجاري|بلدية|زكاة|ضريبة)/.test(allText) && !/(تأمينات اجتماعية|gosi|قيمة مضافة|vat)/.test(allText)) addScore('رسوم ومدفوعات حكومية', 100, /(تجديد كارت|رخصة|نقاط مدد|مدد|قوى|مقيم|جوازات|تأشيرة|رسوم حكومية|غرفة تجارية|سجل تجاري|بلدية|زكاة|ضريبة)/.test(descText));
          check(/(مطبوعات|ورق|أقلام|اقلام|حبر|قرطاسية|مكتبية|أدوات مكتبية|أختام|دفاتر)/, 'أدوات ومهمات مكتبية (قرطاسية ومطبوعات)', 100);
          check(/(صدقة|صدقات|تبرع|جمعية|أوقاف|أيتام|إغاثة|إحسان)/, 'تبرعات ومساهمات مجتمعية', 100);
          check(/(تدريب|دورة|معهد|ورشة عمل|تطوير موظفين|training)/, 'تدريب وتطوير كوادر', 100);
          if (/(أبحاث|بحث وتطوير|r&d|research & development|development)/.test(allText) && !/(عقار|مباني)/.test(allText)) addScore('مصروفات وأبحاث وتطوير (R&D)', 100, /(أبحاث|بحث وتطوير|r&d|research & development|development)/.test(descText));
          check(/(بنك|مصرف|رسوم تحويل|عمولة|مدى|فيزا|ماستركارد)/, 'رسوم بنكية وخدمات مالية', 100);
          if (/(شحن|توصيل|لوجستي|ارامكس|سمسا|جاهز|هنقرستيشن|مرسول|دينا|ونش|سطحة)/.test(allText) || (/(تأجير|ايجار)/.test(allText) && /(دينا|شاحنة|سيارة)/.test(allText))) addScore('نقل وخدمات لوجستية وتوصيل', 100, /(شحن|توصيل|لوجستي|ارامكس|سمسا|جاهز|هنقرستيشن|مرسول|دينا|ونش|سطحة|تأجير دينا|ايجار دينا)/.test(descText));
          if (/(بطارية)/.test(allText) && !/(جوال|سيارة|مركبة|ايفون)/.test(allText)) addScore('أدوات ومهمات استهلاكية متنوعة', 50, /(بطارية)/.test(descText));

          let bestCategory = 'مصروفات تشغيلية متنوعة';
          let max = 0;
          for (const [cat, score] of Object.entries(scores)) {
              if (score > max) { max = score; bestCategory = cat; }
          }
          return bestCategory;
        };

        // --- 🔵 EXPERT REVENUES TAXONOMY ENGINE (SOCPA for F&B) ---
        const getRevenueCategory = (name, desc, rawEnt) => {
          const nameText = String(name).toLowerCase();
          const descText = String(desc).toLowerCase();
          const rawText = String(rawEnt).toLowerCase();
          const allText = nameText + " " + descText + " " + rawText;
          
          let scores = {};
          const addScore = (cat, basePoints, isDescMatch = false) => { scores[cat] = (scores[cat] || 0) + basePoints + (isDescMatch ? 150 : 0); };
          const check = (regex, cat, basePoints = 100) => {
              if (regex.test(allText)) addScore(cat, basePoints, regex.test(descText));
          };

          check(/(جاهز|هنقرستيشن|مرسول|تطبيقات توصيل|طلبات|توصيل|تطبيق|jahez|hungerstation|delivery|ذا شيفز|تويو|toyou|ninja|نينجا|كريم|careem)/, 'إيرادات تطبيقات التوصيل', 100);
          check(/(حفل|زواج|مناسب|بوفيه خارجي|تجهيز|كيترينج|تقديمات|catering|event)/, 'إيرادات حفلات ومناسبات', 100);
          check(/(جملة|شركات|b2b|توريد للغير|بيع جملة|مبيعات الجملة|wholesale)/, 'إيرادات مبيعات جملة (B2B)', 100);
          check(/(كيك|حلويات|مخبوزات|شوكولات|معجنات|cake|sweets|bakery|تورتة)/, 'مبيعات حلويات ومخبوزات', 90);
          check(/(مقهى|قهوة|مشروبات|عصائر|شاي|coffee|drinks)/, 'مبيعات مشروبات وقهوة', 90);
          check(/(مطعم|وجبات|طعام|مأكولات|dine|food|صالة|سفري|محلي)/, 'مبيعات مطعم (داخلي/سفري)', 85);
          check(/(عميل نقدي|نقدي|شبكة|فيزا|ماستركارد|مدى|كاش|cash|pos|نقطة بيع|أبل باي|apple pay)/, 'مبيعات نقدية ونقاط بيع (POS)', 80);
          check(/(تاجير|تأجير|رسوم تأخير|غرامات|إيرادات أخرى|اخرى|other)/, 'إيرادات تشغيلية أخرى', 50);

          let bestCategory = 'إيرادات مبيعات عامة';
          let max = 0;
          for (const [cat, score] of Object.entries(scores)) {
              if (score > max) { max = score; bestCategory = cat; }
          }
          return bestCategory;
        };

        // --- SMART SCHEMA DETECTION ---
        const detectSchema = (keys, sampleData, moduleType) => {
          const schema = {
            Entity_Name: null, Entity_TaxID: null, Invoice_Number: null, Invoice_Date: null, 
            Net_Amount: null, Taxable_Amount: null, NonTaxable_Amount: null, 
            VAT_Amount: null, Total_Amount: null, Item_Description: null
          };

          const scores = {};
          keys.forEach(k => {
            scores[k] = { entity: 0, taxId: 0, invNum: 0, date: 0, total: 0, net: 0, vat: 0, taxable: 0, nonTaxable: 0, desc: 0 };
          });
          
          keys.forEach(k => {
            const lower = String(k).toLowerCase().trim();
            
            // Entity
            if (moduleType === 'expenses' && /(مورد|اسم|شركة|جهة|حساب|دائن|vendor|supplier|merchant)/i.test(lower) && !/(رقم|id|no)/i.test(lower)) scores[k].entity += 500;
            if (moduleType === 'revenues' && /(عميل|زبون|مشتري|مدين|حساب|جهة|اسم|العميل|الزبون|customer|client|buyer|source|channel|منصة|قناة|فرع|branch)/i.test(lower) && !/(رقم|id|no)/i.test(lower)) scores[k].entity += 500;
            
            // Basic Info
            if (/(بيان|تفاصيل|وصف|صنف|مادة|نوع|description|item|البيان|طلب|order)/i.test(lower) && !/(مورد|عميل|اسم|جهة|حساب|رقم|تاريخ|مبلغ)/i.test(lower)) scores[k].desc += 500;
            if (/(رقم.*ضريب|ضريب.*رقم|تسجيل.*ضريب|تعريفي|tax id|vat id|vat no|tin|vat number|vat reg)/i.test(lower)) scores[k].taxId += 500;
            if (/(فاتورة|مستند|مرجع|قيد|سند|invoice|inv|ref|receipt|إيصال|طلب|order)/i.test(lower) && !/(تاريخ|date|اجمالي|قيمة|مبلغ)/i.test(lower)) scores[k].invNum += 500;
            if (/(تاريخ|وقت|date|time|التاريخ|التوقيت)/i.test(lower)) scores[k].date += 500;
            
            // --- 1. SUPER EXACT MATCHES FOR AMOUNTS (POS SYSTEMS) ---
            if (/^(الضريبة|ضريبة|ضرائب|الضرائب|tax|taxes|vat|tva|قيمة الضريبة|مبلغ الضريبة|الضريبة المستحقة|ضريبة القيمة المضافة|الضريبه|ضريبه|vat amount|tax amount|نسبة الضريبة|ضريبة المبيعات)$/i.test(lower)) scores[k].vat += 5000;
            if (/^(الاجمالي|الإجمالي|المجموع|total|gross|إجمالي المبيعات|اجمالي المبيعات|المبلغ الاجمالي|المبلغ الإجمالي|المجموع الاجمالي|المجموع الإجمالي|grand total|النهائي|المبلغ الكلي|المستحق|الاجمالي مع الضريبة|الإجمالي مع الضريبة|total amount|الإجمالي الكلي|اجمالي المبلغ|إجمالي المبلغ|اجمالي الدخل)$/i.test(lower)) scores[k].total += 5000;
            if (/^(الصافي|صافي|net|subtotal|المبيعات|المبلغ|القيمة|الايرادات|الإيرادات|صافي المبيعات|المبيعات الصافية|قبل الضريبة|الاجمالي قبل الضريبة|الإجمالي قبل الضريبة|صافي المبلغ|net amount|المجموع الفرعي|اجمالي المبيعات قبل الضريبة|قيمة المبيعات)$/i.test(lower)) scores[k].net += 5000;
            if (/^(الخاضع|خاضع|الأساس الضريبي|الاساس الضريبي|خاضع للضريبة|المبيعات الخاضعة|taxable|الخاضعة للضريبة|المبلغ الخاضع|الاساس|الأساس|قيمة خاضعة)$/i.test(lower)) scores[k].taxable += 5000;
            if (/^(غير خاضع|معفى|المبيعات المعفاة|بدون ضريبة|صفرية|non-taxable|exempt|معفاة|غير خاضعة|المبلغ المعفى|غير خاضع للضريبة|مبيعات معفاة|مبيعات صفرية)$/i.test(lower)) scores[k].nonTaxable += 5000;

            // --- 2. AGGRESSIVE FUZZY MATCHES FOR AMOUNTS ---
            if (/(ضريب|ضرائب|tax|vat|مضاف|رسوم|tva)/i.test(lower) && !/(رقم|نسب|id|بدون|خاضع|غير|معفى|قبل|بعد|الرقم|تعريف|أساس|اساس|اجمالي|إجمالي|مجموع|total|صافي|net)/i.test(lower)) scores[k].vat += 1000;
            if (/(اجمالي|إجمالي|مجموع|total|gross|النهائي|الكلي|grand total|المستحق)/i.test(lower) && !/(صافي|خاضع|بدون|قبل|ضريبة|ضرائب|tax|vat|نسبة)/i.test(lower)) scores[k].total += 1000;
            if (/(صافي|net|sub|basic|مبيعات|إيراد|ايراد|subtotal|قبل الضريبة|المبلغ|الطلب|orders|قيمة)/i.test(lower) && !/(اجمالي|إجمالي|مجموع|ضريبة|ضرائب|tax|vat|total|gross|خاضع|بدون|بعد|النهائي|الكلي|نسبة)/i.test(lower)) scores[k].net += 800;
            if (/(خاضع|taxable|أساس|اساس)/i.test(lower) && !/(غير|بدون|non|exempt|معفاة|ضريبة|ضرائب)/i.test(lower)) scores[k].taxable += 1000;
            if (/(بدون|غير خاضع|معفى|صفرية|non-taxable|exempt|معفاة|غير خاضعة)/i.test(lower)) scores[k].nonTaxable += 1000;
          });

          // Values inference
          sampleData.slice(0, 20).forEach(row => {
            keys.forEach(k => {
              const val = row[k];
              if (val === null || val === undefined || val === '') return;
              const strVal = String(val).replace(/\.0+$/, '').trim(); 
              if (/^\d{15}$/.test(strVal)) scores[k].taxId += 10;
              if (moduleType === 'expenses' && /^(شركة|مؤسسة|مجموعة|مكتب|مصنع|صيدلية|مركز)/.test(strVal)) scores[k].entity += 10;
              if (moduleType === 'revenues' && /^(السيد|العميل|زبون|شركة|مؤسسة|عميل|جاهز|هنقرستيشن)/.test(strVal)) scores[k].entity += 10;
              if (val instanceof Date || /^\d{4}[\/\-]\d{2}[\/\-]\d{2}/.test(strVal) || /^\d{2}[\/\-]\d{2}[\/\-]\d{4}/.test(strVal)) scores[k].date += 10;
              if (/^[A-Z0-9\-\/]{3,12}$/i.test(strVal) && /[0-9]/.test(strVal) && !/^\d{15}$/.test(strVal)) scores[k].invNum += 2;
            });
          });

          const assignBest = (schemaKey, scoreKey, threshold) => {
            let bestKey = null;
            let maxScore = threshold;
            keys.forEach(k => {
              if (scores[k][scoreKey] > maxScore) { maxScore = scores[k][scoreKey]; bestKey = k; }
            });
            if (bestKey) {
              schema[schemaKey] = bestKey;
              scores[bestKey] = { entity: 0, taxId: 0, invNum: 0, date: 0, total: 0, net: 0, vat: 0, taxable: 0, nonTaxable: 0, desc: 0 };
            }
          };

          assignBest('Entity_TaxID', 'taxId', 15); 
          assignBest('VAT_Amount', 'vat', 20);
          assignBest('Taxable_Amount', 'taxable', 20);
          assignBest('NonTaxable_Amount', 'nonTaxable', 20);
          assignBest('Total_Amount', 'total', 20);
          assignBest('Net_Amount', 'net', 20);
          assignBest('Invoice_Date', 'date', 15);
          assignBest('Item_Description', 'desc', 20); 
          assignBest('Entity_Name', 'entity', 15); 
          assignBest('Invoice_Number', 'invNum', 20);

          if (!schema.Net_Amount && schema.Total_Amount) schema.Net_Amount = schema.Total_Amount;
          if (!schema.Total_Amount && schema.Net_Amount) schema.Total_Amount = schema.Net_Amount;

          return schema;
        };

        const processFinancialData = (rawData, moduleType) => {
          if (!rawData || rawData.length === 0) return null;

          const headers = Object.keys(rawData[0] || {});
          const schema = detectSchema(headers, rawData, moduleType);

          let cleanData = rawData.map((row, index) => {
            const rawEnt = schema.Entity_Name ? row[schema.Entity_Name] : null;
            const rawTaxId = schema.Entity_TaxID ? String(row[schema.Entity_TaxID] || '').replace(/\.\d+$/, '').trim() : '';
            const rawDesc = schema.Item_Description ? row[schema.Item_Description] : '';
            
            let total = schema.Total_Amount ? parseNumber(row[schema.Total_Amount]) : 0;
            let vat = schema.VAT_Amount ? parseNumber(row[schema.VAT_Amount]) : 0;
            let taxable = schema.Taxable_Amount ? parseNumber(row[schema.Taxable_Amount]) : 0;
            let nonTaxable = schema.NonTaxable_Amount ? parseNumber(row[schema.NonTaxable_Amount]) : 0;
            let net = schema.Net_Amount ? parseNumber(row[schema.Net_Amount]) : 0;

            // --- BULLETPROOF MATHEMATICAL RECONCILIATION ENGINE ---
            
            // 0. Force 15% VAT Extraction for Revenues if VAT is completely missing or 0
            if (moduleType === 'revenues') {
                // If Net and Total are identical, OR VAT is 0, we assume it's a Gross amount with 15% inclusive VAT
                if ((net === total && total > 0) || (vat === 0 && total > 0)) {
                    taxable = total / 1.15;
                    vat = total - taxable;
                    net = taxable;
                    nonTaxable = 0;
                }
            } else {
                // For expenses, just fix Net if it wrongly fell back to Total
                if (net === total && total > 0 && vat > 0) {
                    net = total - vat;
                }
            }

            // 1. Calculate strictly missing fields if obvious
            if (vat === 0 && total > net && net > 0) vat = total - net;
            if (net === 0 && total > 0 && vat > 0) net = total - vat;
            if (total === 0 && net > 0 && vat >= 0) total = net + vat;
            if (net === 0 && taxable > 0) net = taxable + nonTaxable;

            // 2. Distribute Net strictly into Taxable / NonTaxable
            if (taxable === 0 && nonTaxable === 0 && net > 0) {
              if (vat > 0) { 
                 let expectedVatIfFullyTaxable = net * 0.15;
                 // If VAT matches 15% of Net perfectly (allow small rounding error)
                 if (Math.abs(vat - expectedVatIfFullyTaxable) <= 1.5) { 
                    taxable = net;
                    nonTaxable = 0;
                 } else {
                    // It's a mixed invoice (partially taxable). Find the exact taxable base from the VAT.
                    let calculatedTaxable = vat / 0.15;
                    if (calculatedTaxable <= net) {
                       taxable = calculatedTaxable;
                       nonTaxable = net - taxable;
                    } else {
                       taxable = net; // Safety fallback
                       nonTaxable = 0;
                    }
                 }
              } else {
                  // No VAT -> Entirely Non-Taxable
                  taxable = 0;
                  nonTaxable = net;
              }
            } else if (taxable > 0 || nonTaxable > 0) {
                // If explicitly mapped by columns, trust the columns but ensure Net and VAT align perfectly
                net = taxable + nonTaxable;
                if (vat === 0 && taxable > 0) vat = taxable * 0.15;
            }
            
            // 3. Strict Rounding
            taxable = parseFloat(taxable.toFixed(2));
            nonTaxable = parseFloat(nonTaxable.toFixed(2));
            vat = parseFloat(vat.toFixed(2));
            net = parseFloat((taxable + nonTaxable).toFixed(2));
            
            // 4. Force Total to match the mathematical sum perfectly
            let calculatedTotal = parseFloat((net + vat).toFixed(2));
            if (total === 0 || Math.abs(total - calculatedTotal) <= 2) {
                total = calculatedTotal;
            } else {
                total = parseFloat(total.toFixed(2));
            }

            return {
              _originalIndex: index + 2,
              Raw_Entity: rawEnt ? String(rawEnt).trim() : (moduleType==='expenses'?'مورد غير مدرج':'عميل نقدي / غير مدرج'),
              Entity_ID: null,
              Entity_Normalized_Name: null,
              Entity_TaxID: rawTaxId,
              Invoice_Number: (schema.Invoice_Number && row[schema.Invoice_Number]) ? String(row[schema.Invoice_Number]).trim() : 'بدون رقم',
              Invoice_Date: schema.Invoice_Date ? parseDate(row[schema.Invoice_Date]) : 'غير محدد',
              Item_Description: rawDesc ? String(rawDesc).trim() : '', 
              Category: null, 
              Net_Amount: net,
              Taxable_Amount: taxable,
              NonTaxable_Amount: nonTaxable,
              VAT_Amount: vat,
              Total_Amount: total,
              Anomalies: [],
              Confidence_Score: 100
            };
          }).filter(row => row.Total_Amount > 0 || row.Net_Amount > 0); 

          if (cleanData.length === 0) return null;

          const uniqueEntities = [...new Set(cleanData.map(d => d.Raw_Entity))];
          const entityMapping = {};
          let currentId = 1;
          const prefix = moduleType === 'expenses' ? 'SUP' : 'CUS';

          uniqueEntities.forEach(ent => {
            if (entityMapping[ent]) return; 
            const similar = uniqueEntities.filter(s => !entityMapping[s] && isSimilarName(ent, s));
            const canonicalName = similar.sort((a, b) => b.length - a.length)[0]; 
            const entId = `${prefix}-${String(currentId).padStart(4, '0')}`;
            similar.forEach(s => { entityMapping[s] = { id: entId, name: canonicalName }; });
            currentId++;
          });

          cleanData.forEach(row => {
            const mapping = entityMapping[row.Raw_Entity];
            row.Entity_ID = mapping.id;
            row.Entity_Normalized_Name = mapping.name;
            row.Category = moduleType === 'expenses' 
              ? getExpenseCategory(mapping.name, row.Item_Description) 
              : getRevenueCategory(mapping.name, row.Item_Description, row.Raw_Entity);
          });

          const invoiceRegistry = new Set();
          cleanData.forEach(row => {
            const expectedTotal = parseFloat((row.Taxable_Amount + row.NonTaxable_Amount + row.VAT_Amount).toFixed(2));
            const actualTotal = parseFloat(row.Total_Amount.toFixed(2));
            if (Math.abs(expectedTotal - actualTotal) > 1.00) {
              row.Anomalies.push(`خطأ في الجمع: الصافي والضريبة (${expectedTotal}) لا يساوي الإجمالي (${actualTotal})`);
            }
            if (row.Invoice_Number && !/^(بدون|0|n\/a|-|_|none|null)$/i.test(row.Invoice_Number) && row.Invoice_Number !== 'بدون رقم') {
                const invKey = `${row.Entity_ID}-${row.Invoice_Number}`;
                if (invoiceRegistry.has(invKey)) {
                  row.Anomalies.push(`فاتورة مكررة: رقم ${row.Invoice_Number} مسجل مسبقاً لنفس الجهة`);
                }
                invoiceRegistry.add(invKey);
            }
          });

          const entityProfiles = {};
          cleanData.forEach(row => {
            if (!entityProfiles[row.Entity_ID]) {
              entityProfiles[row.Entity_ID] = {
                id: row.Entity_ID, name: row.Entity_Normalized_Name, taxId: row.Entity_TaxID, categoriesSet: new Set(), invoiceCount: 0, totalNet: 0, totalTaxableNet: 0, totalNonTaxableNet: 0, totalVAT: 0, totalSpend: 0, anomalies: 0
              };
            }
            if (!entityProfiles[row.Entity_ID].taxId && row.Entity_TaxID) entityProfiles[row.Entity_ID].taxId = row.Entity_TaxID;
            entityProfiles[row.Entity_ID].categoriesSet.add(row.Category);
            entityProfiles[row.Entity_ID].invoiceCount += 1;
            entityProfiles[row.Entity_ID].totalNet += row.Net_Amount;
            entityProfiles[row.Entity_ID].totalTaxableNet += row.Taxable_Amount;
            entityProfiles[row.Entity_ID].totalNonTaxableNet += row.NonTaxable_Amount;
            entityProfiles[row.Entity_ID].totalVAT += row.VAT_Amount;
            entityProfiles[row.Entity_ID].totalSpend += row.Total_Amount;
            if (row.Anomalies.length > 0) entityProfiles[row.Entity_ID].anomalies += 1;
          });

          const finalEntities = Object.values(entityProfiles).map(profile => {
             profile.categoryString = Array.from(profile.categoriesSet).join(" ، ");
             profile.categoriesArray = Array.from(profile.categoriesSet);
             delete profile.categoriesSet; 
             return profile;
          }).sort((a, b) => b.totalSpend - a.totalSpend);

          return { schema, records: cleanData, entities: finalEntities };
        };

        // --- UI COMPONENTS ---
        const Card = ({ title, value, subtitle, icon: IconComp, color = "blue" }) => {
          const colorMap = {
            blue: "bg-blue-50 text-blue-600 border-blue-100",
            emerald: "bg-emerald-50 text-emerald-600 border-emerald-100",
            indigo: "bg-indigo-50 text-indigo-600 border-indigo-100",
            red: "bg-red-50 text-red-600 border-red-100"
          };
          return (
            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-start space-x-4 space-x-reverse transition-all hover:shadow-md">
              <div className={`p-3 rounded-lg ${colorMap[color]}`}>
                <IconComp className="w-6 h-6" />
              </div>
              <div>
                <p className="text-sm font-medium text-slate-500 mb-1">{title}</p>
                <h3 className="text-2xl font-bold text-slate-800">{value}</h3>
                {subtitle && <p className="text-xs text-slate-400 mt-1">{subtitle}</p>}
              </div>
            </div>
          );
        };

        const NavItem = ({ mode, tab, icon: IconC, label, badge, currentMode, currentTab, onClick }) => {
           const isActive = currentMode === mode && currentTab === tab;
           const activeClass = mode === 'expenses' ? 'bg-indigo-600 text-white shadow-md' : 'bg-emerald-600 text-white shadow-md';
           const hoverClass = 'text-slate-400 hover:bg-slate-800 hover:text-white';
           return (
               <button onClick={() => onClick(mode, tab)} className={`w-full flex items-center space-x-3 space-x-reverse px-4 py-2.5 rounded-lg transition-colors text-sm font-bold mb-1.5 ${isActive ? activeClass : hoverClass}`}>
                   <IconC className="w-5 h-5 shrink-0" />
                   <span className="flex-1 text-right truncate">{label}</span>
                   {badge > 0 && <span className="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full">{badge}</span>}
               </button>
           )
        };

        // --- MAIN APPLICATION ---
        function App() {
          const [appMode, setAppMode] = useState('expenses'); 
          const [activeTab, setActiveTab] = useState('upload'); 
          const [status, setStatus] = useState('loading_script'); 
          const [auditMode, setAuditMode] = useState(false);
          
          const [expensesData, setExpensesData] = useState({ records: [], entities: [], schema: null });
          const [revenuesData, setRevenuesData] = useState({ records: [], entities: [], schema: null });
          
          // State for Isolated Filters: { 'expenses-dashboard': {search:'', start:'', end:'', month:''}, ... }
          const [pageFilters, setPageFilters] = useState({});

          const [expandedEntities, setExpandedEntities] = useState({});
          const [exportMenuOpen, setExportMenuOpen] = useState(false);
          const [editSubCat, setEditSubCat] = useState({ entId: null, oldCat: '', value: '' });
          const [expandedSubCats, setExpandedSubCats] = useState({});
          const [expandedCategories, setExpandedCategories] = useState({}); 
          const [editInvoice, setEditInvoice] = useState({ index: null, value: '' });

          const currentData = appMode === 'expenses' ? expensesData : (appMode === 'revenues' ? revenuesData : { records: [], entities: [], schema: null });
          const setCurrentData = appMode === 'expenses' ? setExpensesData : setRevenuesData;

          const entLabel = appMode === 'expenses' ? 'المورد' : 'العميل';
          const entsLabel = appMode === 'expenses' ? 'الموردين' : 'العملاء';
          const actLabel = appMode === 'expenses' ? 'المصروفات' : 'الإيرادات';

          // Get filters for current tab
          const filterKey = `${appMode}-${activeTab}`;
          const currentFilters = pageFilters[filterKey] || { search: '', start: '', end: '', month: '' };
          
          const updateFilters = (updates) => {
              setPageFilters(prev => ({
                  ...prev,
                  [filterKey]: { ...currentFilters, ...updates }
              }));
          };

          useEffect(() => {
            const checkLibs = setInterval(() => {
              if (window.XLSX && window.html2pdf) {
                setStatus('ready');
                clearInterval(checkLibs);
              }
            }, 100);
            return () => clearInterval(checkLibs);
          }, []);

          const handleNavClick = (mode, tab) => {
              setAppMode(mode);
              setActiveTab(tab);
              
              if (mode !== 'reports') {
                  const targetData = mode === 'expenses' ? expensesData : revenuesData;
                  if (tab !== 'upload' && targetData.records.length === 0) {
                      setActiveTab('upload');
                  }
              }
          };

          const handleFileUpload = (e, uploadMode) => {
            const file = e.target.files[0];
            if (!file || !window.XLSX) return;
            e.target.value = null; 

            setStatus('processing');
            const reader = new FileReader();
            reader.onload = (evt) => {
              try {
                const arrayBuffer = evt.target.result;
                const wb = window.XLSX.read(arrayBuffer, { type: 'array', cellDates: true });
                const wsname = wb.SheetNames[0];
                const ws = wb.Sheets[wsname];
                const rawArray = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
                
                let headerRowIndex = 0; let maxScore = 0;
                for (let i = 0; i < Math.min(30, rawArray.length); i++) {
                   const row = rawArray[i];
                   if (!row) continue;
                   let score = 0;
                   row.forEach(cell => {
                     const str = String(cell).toLowerCase();
                     if (/(مورد|عميل|زبون|مشتري|بيان|تفاصيل|وصف|صنف|رقم|تاريخ|مبلغ|اجمالي|صافي|دائن|مدين|ضريبة|خاضع|ضريبي)/.test(str) || /^\d{15}$/.test(str)) score++;
                   });
                   if (score > maxScore) { maxScore = score; headerRowIndex = i; }
                }

                const headers = rawArray[headerRowIndex] || [];
                const rawData = [];
                for (let i = headerRowIndex + 1; i < rawArray.length; i++) {
                   const row = rawArray[i];
                   if (!row || !row.length || row.every(cell => cell === null || cell === '')) continue; 
                   const obj = {};
                   headers.forEach((h, j) => { if (h) obj[h] = row[j]; });
                   rawData.push(obj);
                }

                if (rawData.length === 0) {
                  alert("الملف لا يحتوي على بيانات صالحة.");
                  setStatus('ready');
                  return;
                }
                
                const processed = processFinancialData(rawData, uploadMode);
                if (processed) {
                  if (uploadMode === 'expenses') setExpensesData(processed);
                  else setRevenuesData(processed);
                  
                  setAppMode(uploadMode);
                  setActiveTab('dashboard');
                  setStatus('ready');
                } else {
                  alert("لم نتمكن من استخراج الأعمدة بنجاح.");
                  setStatus('ready');
                }
              } catch (err) {
                console.error(err);
                alert("حدث خطأ أثناء تحليل الإكسيل.");
                setStatus('ready');
              }
            };
            reader.readAsArrayBuffer(file);
          };

          const toggleEntity = (entId) => setExpandedEntities(p => ({ ...p, [entId]: !p[entId] }));
          const toggleSubCat = (key) => setExpandedSubCats(p => ({ ...p, [key]: !p[key] }));
          const toggleCategoryView = (catName) => setExpandedCategories(p => ({ ...p, [catName]: !p[catName] }));

          // --- FILTERING DYNAMIC AGGREGATION ---
          const filteredRecords = useMemo(() => {
              if (!currentData || !currentData.records) return [];
              return currentData.records.filter(r => {
                  const passAudit = auditMode ? r.Anomalies.length > 0 : true;
                  const passDate = isDateInRange(r.Invoice_Date, currentFilters.start, currentFilters.end, currentFilters.month);
                  const passSearch = currentFilters.search === '' || 
                      r.Entity_Normalized_Name.toLowerCase().includes(currentFilters.search.toLowerCase()) || 
                      r.Invoice_Number.toLowerCase().includes(currentFilters.search.toLowerCase()) ||
                      (r.Entity_TaxID && r.Entity_TaxID.toLowerCase().includes(currentFilters.search.toLowerCase())) ||
                      (r.Item_Description && r.Item_Description.toLowerCase().includes(currentFilters.search.toLowerCase())) ||
                      (r.Category && r.Category.toLowerCase().includes(currentFilters.search.toLowerCase()));
                  return passAudit && passDate && passSearch;
              });
          }, [currentData, auditMode, currentFilters]);

          const totalSpend = filteredRecords.reduce((sum, r) => sum + r.Total_Amount, 0);
          const totalVAT = filteredRecords.reduce((sum, r) => sum + r.VAT_Amount, 0);
          const totalTaxable = filteredRecords.reduce((sum, r) => sum + r.Taxable_Amount, 0);
          const totalNonTaxable = filteredRecords.reduce((sum, r) => sum + r.NonTaxable_Amount, 0);
          const anomaliesCount = filteredRecords.filter(r => r.Anomalies.length > 0).length;

          const filteredEntities = useMemo(() => {
              if (!currentData || !currentData.entities) return [];
              const dynamicMap = {};
              filteredRecords.forEach(r => {
                  if (!dynamicMap[r.Entity_ID]) {
                      const orig = currentData.entities.find(s => s.id === r.Entity_ID) || {};
                      dynamicMap[r.Entity_ID] = { ...orig, invoiceCount: 0, totalNet: 0, totalTaxableNet: 0, totalNonTaxableNet: 0, totalVAT: 0, totalSpend: 0, anomalies: 0, categoriesSet: new Set() };
                  }
                  const s = dynamicMap[r.Entity_ID];
                  s.invoiceCount++; s.totalNet += r.Net_Amount; s.totalTaxableNet += r.Taxable_Amount; s.totalNonTaxableNet += r.NonTaxable_Amount; s.totalVAT += r.VAT_Amount; s.totalSpend += r.Total_Amount;
                  if (r.Anomalies.length > 0) s.anomalies++;
                  s.categoriesSet.add(r.Category);
              });
              return Object.values(dynamicMap).map(s => {
                  s.categoriesArray = Array.from(s.categoriesSet);
                  s.categoryString = s.categoriesArray.join(" ، ");
                  return s;
              }).sort((a,b) => b.totalSpend - a.totalSpend);
          }, [filteredRecords, currentData]);

          const categoriesArray = useMemo(() => {
              const map = {};
              filteredRecords.forEach(r => {
                  const cat = r.Category || 'غير مصنف';
                  if(!map[cat]) map[cat] = { name: cat, invoiceCount: 0, totalTaxable: 0, totalNonTaxable: 0, totalVAT: 0, totalSpend: 0, invoices: [] };
                  const c = map[cat];
                  c.invoiceCount++; c.totalTaxable += r.Taxable_Amount; c.totalNonTaxable += r.NonTaxable_Amount; c.totalVAT += r.VAT_Amount; c.totalSpend += r.Total_Amount;
                  c.invoices.push(r);
              });
              return Object.values(map).sort((a,b) => b.totalSpend - a.totalSpend);
          }, [filteredRecords]);

          // --- P&L INCOME STATEMENT CALCULATIONS ---
          const plFilteredRevenues = useMemo(() => {
              return revenuesData.records.filter(r => isDateInRange(r.Invoice_Date, currentFilters.start, currentFilters.end, currentFilters.month));
          }, [revenuesData, currentFilters]);

          const plFilteredExpenses = useMemo(() => {
              return expensesData.records.filter(r => isDateInRange(r.Invoice_Date, currentFilters.start, currentFilters.end, currentFilters.month));
          }, [expensesData, currentFilters]);

          const incomeStatement = useMemo(() => {
              const cogsCategories = ['تكلفة مبيعات - مواد غذائية (خامات ومكونات)', 'تكلفة مبيعات - مواد تعبئة وتغليف ومستلزمات تقديم'];
              const capexCategories = ['أصول ثابتة - أجهزة حاسب آلي ومعدات'];
              
              let totalRevenue = 0;
              let revBreakdown = {};
              plFilteredRevenues.forEach(r => {
                  totalRevenue += r.Net_Amount;
                  revBreakdown[r.Category] = (revBreakdown[r.Category] || 0) + r.Net_Amount;
              });

              let totalCOGS = 0;
              let totalOPEX = 0;
              let totalCAPEX = 0;
              let cogsBreakdown = {};
              let opexBreakdown = {};
              
              plFilteredExpenses.forEach(r => {
                  const cat = r.Category || 'غير مصنف';
                  const amt = r.Net_Amount;
                  if (cogsCategories.includes(cat)) {
                      totalCOGS += amt;
                      cogsBreakdown[cat] = (cogsBreakdown[cat] || 0) + amt;
                  } else if (capexCategories.includes(cat)) {
                      totalCAPEX += amt;
                  } else {
                      totalOPEX += amt;
                      opexBreakdown[cat] = (opexBreakdown[cat] || 0) + amt;
                  }
              });

              const grossProfit = totalRevenue - totalCOGS;
              const grossMargin = totalRevenue > 0 ? (grossProfit / totalRevenue) * 100 : 0;
              const netOperatingIncome = grossProfit - totalOPEX;
              const netMargin = totalRevenue > 0 ? (netOperatingIncome / totalRevenue) * 100 : 0;

              return {
                  totalRevenue, revBreakdown: Object.entries(revBreakdown).sort((a,b)=>b[1]-a[1]),
                  totalCOGS, cogsBreakdown: Object.entries(cogsBreakdown).sort((a,b)=>b[1]-a[1]),
                  totalOPEX, opexBreakdown: Object.entries(opexBreakdown).sort((a,b)=>b[1]-a[1]),
                  grossProfit, grossMargin,
                  netOperatingIncome, netMargin,
                  totalCAPEX
              };
          }, [plFilteredRevenues, plFilteredExpenses]);

          // --- MANUAL OVERRIDES ---
          const handleSaveSubCategory = (e, entId, oldCat) => {
            e.stopPropagation();
            if (!editSubCat.value.trim() || editSubCat.value === oldCat) {
                setEditSubCat({ entId: null, oldCat: '', value: '' });
                return;
            }
            const newCat = editSubCat.value;
            const updatedRecords = currentData.records.map(r => {
                if (r.Entity_ID === entId && r.Category === oldCat) return { ...r, Category: newCat };
                return r;
            });
            updateCurrentDataState(updatedRecords);
            setEditSubCat({ entId: null, oldCat: '', value: '' });
          };

          const handleSaveInvoiceCategory = (originalIndex) => {
            if (!editInvoice.value.trim()) {
                setEditInvoice({ index: null, value: '' });
                return;
            }
            const updatedRecords = currentData.records.map(r => {
                if (r._originalIndex === originalIndex) return { ...r, Category: editInvoice.value };
                return r;
            });
            updateCurrentDataState(updatedRecords);
            setEditInvoice({ index: null, value: '' });
          };
          
          const handleSaveGlobalCategory = (oldCatName, newCatName) => {
             if (!newCatName.trim() || newCatName === oldCatName) return;
             const updatedRecords = currentData.records.map(r => {
                 if (r.Category === oldCatName) return { ...r, Category: newCatName };
                 return r;
             });
             updateCurrentDataState(updatedRecords);
          }

          const updateCurrentDataState = (updatedRecords) => {
            const profiles = {};
            updatedRecords.forEach(row => {
                if (!profiles[row.Entity_ID]) {
                    profiles[row.Entity_ID] = { id: row.Entity_ID, name: row.Entity_Normalized_Name, taxId: row.Entity_TaxID, categoriesSet: new Set(), invoiceCount: 0, totalNet: 0, totalTaxableNet: 0, totalNonTaxableNet: 0, totalVAT: 0, totalSpend: 0, anomalies: 0 };
                }
                if (!profiles[row.Entity_ID].taxId && row.Entity_TaxID) profiles[row.Entity_ID].taxId = row.Entity_TaxID;
                profiles[row.Entity_ID].categoriesSet.add(row.Category);
                profiles[row.Entity_ID].invoiceCount += 1;
                profiles[row.Entity_ID].totalNet += row.Net_Amount;
                profiles[row.Entity_ID].totalTaxableNet += row.Taxable_Amount;
                profiles[row.Entity_ID].totalNonTaxableNet += row.NonTaxable_Amount;
                profiles[row.Entity_ID].totalVAT += row.VAT_Amount;
                profiles[row.Entity_ID].totalSpend += row.Total_Amount;
                if (row.Anomalies.length > 0) profiles[row.Entity_ID].anomalies += 1;
            });

            const finalEntities = Object.values(profiles).map(profile => {
                profile.categoryString = Array.from(profile.categoriesSet).join(" ، ");
                profile.categoriesArray = Array.from(profile.categoriesSet);
                delete profile.categoriesSet; 
                return profile;
            }).sort((a, b) => b.totalSpend - a.totalSpend);

            setCurrentData({ ...currentData, records: updatedRecords, entities: finalEntities });
          }

          // --- EXPORT FUNCTIONS ---
          const exportToExcel = () => {
            setExportMenuOpen(false);
            if (!filteredEntities.length) return;

            const wb = window.XLSX.utils.book_new();

            const entsExport = filteredEntities.map(s => ({
                [`اسم ${entLabel}`]: s.name,
                "الرقم الضريبي": s.taxId || "غير متوفر",
                "التوجيهات المحاسبية": s.categoryString, 
                "العمليات": s.invoiceCount,
                "الخاضع": s.totalTaxableNet,
                "غير الخاضع": s.totalNonTaxableNet,
                "الضريبة": s.totalVAT,
                "الإجمالي": s.totalSpend,
                "ملاحظات": s.anomalies
            }));
            const ws1 = window.XLSX.utils.json_to_sheet(entsExport);
            window.XLSX.utils.book_append_sheet(wb, ws1, `ملخص ${entsLabel}`);

            const recordsExport = filteredRecords.map(r => ({
                "رقم المستند": r.Invoice_Number,
                "التاريخ": r.Invoice_Date,
                [`اسم ${entLabel}`]: r.Entity_Normalized_Name,
                "البيان / الوصف": r.Item_Description || "-", 
                "التوجيه المحاسبي": r.Category, 
                "الخاضع": r.Taxable_Amount,
                "غير خاضع": r.NonTaxable_Amount,
                "الضريبة": r.VAT_Amount,
                "الإجمالي": r.Total_Amount,
                "ملاحظات": r.Anomalies.length > 0 ? r.Anomalies.join(" | ") : "سليم"
            }));
            const ws2 = window.XLSX.utils.json_to_sheet(recordsExport);
            window.XLSX.utils.book_append_sheet(wb, ws2, "السجل التفصيلي");

            const catExportArray = categoriesArray.map(c => ({
                "التصنيف المحاسبي": c.name,
                "العمليات": c.invoiceCount,
                "الخاضع": c.totalTaxable,
                "غير خاضع": c.totalNonTaxable,
                "الضريبة": c.totalVAT,
                "الإجمالي": c.totalSpend
            }));
            const ws3 = window.XLSX.utils.json_to_sheet(catExportArray);
            window.XLSX.utils.book_append_sheet(wb, ws3, "ميزان التصنيفات");

            window.XLSX.writeFile(wb, `تقرير_${actLabel}_مطاعم.xlsx`);
          };

          const exportToPDF = () => {
            setExportMenuOpen(false);
            if (!filteredEntities.length) return;
            setStatus('exporting');
            setTimeout(() => {
                const element = document.getElementById('pdf-report-template');
                element.style.display = 'block'; 
                const opt = {
                  margin: 0.4, filename: `تقرير_${actLabel}_مطاعم.pdf`,
                  image: { type: 'jpeg', quality: 0.98 },
                  html2canvas: { scale: 2, useCORS: true },
                  jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
                };
                window.html2pdf().set(opt).from(element).save().then(() => {
                    element.style.display = 'none'; setStatus('ready');
                }).catch(err => {
                    element.style.display = 'none'; setStatus('ready');
                    alert("حدث خطأ أثناء التصدير.");
                });
            }, 500);
          };

          if (status === 'loading_script') {
            return <div className="h-screen flex items-center justify-center bg-slate-900 text-white"><Activity className="animate-spin mr-2"/> تهيئة النظام الشامل (ERP)...</div>;
          }

          return (
            <div className="flex h-screen overflow-hidden bg-slate-50" dir="rtl">
              
              <datalist id="acc-categories">
                  <option value="أصول ثابتة - أجهزة حاسب آلي ومعدات" />
                  <option value="تكلفة مبيعات - مواد غذائية (خامات ومكونات)" />
                  <option value="تكلفة مبيعات - مواد تعبئة وتغليف ومستلزمات تقديم" />
                  <option value="أدوات ومهمات طعام ومطبخ (تشغيلية)" />
                  <option value="مواد وأدوات تنظيف متنوعة" />
                  <option value="صيانة وتشغيل مباني ومرافق" />
                  <option value="صيانة سيارات ومعدات نقل" />
                  <option value="صيانة أجهزة إلكترونية وتقنية" />
                  <option value="مواد بترولية، محروقات وغاز" />
                  <option value="إستشارات وأتعاب مهنية" />
                  <option value="اشتراكات تقنية وبرمجيات (IT & SaaS)" />
                  <option value="تسويق وحملات إعلانية" />
                  <option value="رسوم ومدفوعات حكومية" />
                  <option value="مصروفات التأمينات الاجتماعية (GOSI)" />
                  <option value="مصروفات تأمين طبي للموظفين" />
                  <option value="مصروفات إيجارات وعقارات" />
                  <option value="زي عاملين ومهمات عمل" />
                  <option value="مصروفات كهرباء" />
                  <option value="مصروفات مياه" />
                  <option value="مصروفات اتصالات وانترنت" />
                  <option value="أدوات ومهمات مكتبية (قرطاسية ومطبوعات)" />
                  <option value="تبرعات ومساهمات مجتمعية" />
                  <option value="رسوم بنكية وخدمات مالية" />
                  <option value="مستلزمات حفلات وزينة وديكور" />
                  <option value="مصروفات رعاية طبية وأدوية" />
                  <option value="تدريب وتطوير كوادر" />
                  <option value="مصروفات وأبحاث وتطوير (R&D)" />
                  <option value="نقل وخدمات لوجستية وتوصيل" />
                  <option value="مصروفات تشغيلية متنوعة" />
                  <option value="إيرادات تطبيقات التوصيل" />
                  <option value="إيرادات حفلات ومناسبات" />
                  <option value="إيرادات مبيعات جملة (B2B)" />
                  <option value="مبيعات حلويات ومخبوزات" />
                  <option value="مبيعات مشروبات وقهوة" />
                  <option value="مبيعات مطعم (داخلي/سفري)" />
                  <option value="مبيعات نقدية ونقاط بيع (POS)" />
                  <option value="إيرادات تشغيلية أخرى" />
              </datalist>

              {/* OVERLAY */}
              {(status === 'processing' || status === 'exporting') && (
                <div className="absolute z-50 inset-0 flex flex-col items-center justify-center bg-slate-900/90 backdrop-blur-sm text-white">
                  <div className="w-16 h-16 border-4 border-indigo-400 border-t-white rounded-full animate-spin mb-4"></div>
                  <h2 className="text-xl font-bold">{status === 'exporting' ? 'جاري تصدير التقرير...' : 'جاري التدقيق والتوجيه المحاسبي (ERP)...'}</h2>
                </div>
              )}

              {/* --- HIDDEN PDF REPORT TEMPLATE --- */}
              <div id="pdf-report-template" style={{ display: 'none', background: 'white', padding: '40px', direction: 'rtl', fontFamily: 'Tajawal, sans-serif' }}>
                   <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: `3px solid ${appMode==='expenses'?'#1e293b':'#064e3b'}`, paddingBottom: '20px', marginBottom: '30px' }}>
                       <div>
                           <h1 style={{ fontSize: '28px', fontWeight: 'bold', color: '#0f172a', margin: 0 }}>تقرير ميزان المراجعة لـ {actLabel}</h1>
                           <p style={{ color: '#64748b', marginTop: '5px', fontSize: '14px' }}>تاريخ التصدير: {new Date().toLocaleDateString('ar-SA')}</p>
                           {(currentFilters.start || currentFilters.end || currentFilters.month) && <p style={{ color: '#4f46e5', marginTop: '5px', fontSize: '12px', fontWeight: 'bold' }}>الفترة: {currentFilters.month || `${currentFilters.start} إلى ${currentFilters.end}`}</p>}
                       </div>
                       <div style={{ display: 'flex', alignItems: 'center', color: appMode==='expenses'?'#4f46e5':'#059669', fontWeight: 'bold', fontSize: '24px' }}>
                           FinIntel ERP {appMode==='expenses' ? <Zap className="w-8 h-8 mr-2"/> : <TrendingUp className="w-8 h-8 mr-2"/>}
                       </div>
                   </div>

                   <div style={{ display: 'flex', gap: '15px', marginBottom: '30px' }}>
                      <div style={{ flex: 1, padding: '15px', background: '#f8fafc', border: '1px solid #e2e8f0', borderRadius: '8px' }}>
                         <p style={{ fontSize: '12px', color: '#64748b', margin: '0 0 5px 0' }}>الإجمالي الكلي</p>
                         <h3 style={{ fontSize: '20px', fontWeight: 'bold', margin: 0 }}>{formatCurrency(totalSpend)}</h3>
                      </div>
                      <div style={{ flex: 1, padding: '15px', background: '#eff6ff', border: '1px solid #bfdbfe', borderRadius: '8px' }}>
                         <p style={{ fontSize: '12px', color: '#3b82f6', margin: '0 0 5px 0' }}>الأساس الخاضع للضريبة</p>
                         <h3 style={{ fontSize: '20px', fontWeight: 'bold', color: '#1d4ed8', margin: 0 }}>{formatCurrency(totalTaxable)}</h3>
                      </div>
                      <div style={{ flex: 1, padding: '15px', background: '#ecfdf5', border: '1px solid #bbf7d0', borderRadius: '8px' }}>
                         <p style={{ fontSize: '12px', color: '#10b981', margin: '0 0 5px 0' }}>مبلغ غير خاضع / معفى</p>
                         <h3 style={{ fontSize: '20px', fontWeight: 'bold', color: '#047857', margin: 0 }}>{formatCurrency(totalNonTaxable)}</h3>
                      </div>
                      <div style={{ flex: 1, padding: '15px', background: '#eef2ff', border: '1px solid #c7d2fe', borderRadius: '8px' }}>
                         <p style={{ fontSize: '12px', color: '#4f46e5', margin: '0 0 5px 0' }}>إجمالي الضريبة</p>
                         <h3 style={{ fontSize: '20px', fontWeight: 'bold', color: '#4338ca', margin: 0 }}>{formatCurrency(totalVAT)}</h3>
                      </div>
                   </div>

                   <h2 className="page-break" style={{ fontSize: '20px', fontWeight: 'bold', color: '#1e293b', marginBottom: '15px', borderBottom: '1px solid #cbd5e1', paddingBottom: '10px' }}>ملخص التصنيفات المحاسبية (ميزان المراجعة)</h2>
                   <table style={{ width: '100%', textAlign: 'right', fontSize: '12px', borderCollapse: 'collapse', marginBottom: '40px' }}>
                      <thead>
                         <tr style={{ backgroundColor: appMode==='expenses'?'#1e293b':'#064e3b', color: 'white' }}>
                             <th style={{ padding: '10px', border: '1px solid #334155' }}>التصنيف المحاسبي</th>
                             <th style={{ padding: '10px', border: '1px solid #334155', textAlign: 'center' }}>العمليات</th>
                             <th style={{ padding: '10px', border: '1px solid #334155' }}>خاضع</th>
                             <th style={{ padding: '10px', border: '1px solid #334155' }}>غير خاضع</th>
                             <th style={{ padding: '10px', border: '1px solid #334155' }}>الضريبة</th>
                             <th style={{ padding: '10px', border: '1px solid #334155' }}>الإجمالي</th>
                         </tr>
                      </thead>
                      <tbody>
                         {categoriesArray.map((c, i) => (
                            <tr key={i} style={{ backgroundColor: i % 2 === 0 ? '#f8fafc' : 'white' }}>
                               <td style={{ padding: '10px', border: '1px solid #e2e8f0', fontWeight: 'bold', color: '#0f172a' }}>{c.name}</td>
                               <td style={{ padding: '10px', border: '1px solid #e2e8f0', textAlign: 'center' }}>{c.invoiceCount}</td>
                               <td style={{ padding: '10px', border: '1px solid #e2e8f0' }}>{formatCurrency(c.totalTaxable)}</td>
                               <td style={{ padding: '10px', border: '1px solid #e2e8f0' }}>{formatCurrency(c.totalNonTaxable)}</td>
                               <td style={{ padding: '10px', border: '1px solid #e2e8f0' }}>{formatCurrency(c.totalVAT)}</td>
                               <td style={{ padding: '10px', border: '1px solid #e2e8f0', fontWeight: 'bold' }}>{formatCurrency(c.totalSpend)}</td>
                            </tr>
                         ))}
                      </tbody>
                   </table>

                   <h2 className="page-break" style={{ fontSize: '20px', fontWeight: 'bold', color: '#1e293b', marginBottom: '15px', borderBottom: '1px solid #cbd5e1', paddingBottom: '10px' }}>ملخص حسابات {entsLabel}</h2>
                   <table style={{ width: '100%', textAlign: 'right', fontSize: '12px', borderCollapse: 'collapse', marginBottom: '40px' }}>
                      <thead>
                         <tr style={{ backgroundColor: appMode==='expenses'?'#1e293b':'#064e3b', color: 'white' }}>
                             <th style={{ padding: '10px', border: '1px solid #334155' }}>اسم {entLabel}</th>
                             <th style={{ padding: '10px', border: '1px solid #334155' }}>الرقم الضريبي</th>
                             <th style={{ padding: '10px', border: '1px solid #334155', textAlign: 'center' }}>العمليات</th>
                             <th style={{ padding: '10px', border: '1px solid #334155' }}>خاضع</th>
                             <th style={{ padding: '10px', border: '1px solid #334155' }}>الضريبة</th>
                             <th style={{ padding: '10px', border: '1px solid #334155' }}>الإجمالي</th>
                         </tr>
                      </thead>
                      <tbody>
                         {filteredEntities.map((s, i) => (
                            <tr key={i} style={{ backgroundColor: i % 2 === 0 ? '#f8fafc' : 'white' }}>
                               <td style={{ padding: '10px', border: '1px solid #e2e8f0', fontWeight: 'bold' }}>{s.name}</td>
                               <td style={{ padding: '10px', border: '1px solid #e2e8f0' }}>{s.taxId || '-'}</td>
                               <td style={{ padding: '10px', border: '1px solid #e2e8f0', textAlign: 'center' }}>{s.invoiceCount}</td>
                               <td style={{ padding: '10px', border: '1px solid #e2e8f0' }}>{formatCurrency(s.totalTaxableNet)}</td>
                               <td style={{ padding: '10px', border: '1px solid #e2e8f0' }}>{formatCurrency(s.totalVAT)}</td>
                               <td style={{ padding: '10px', border: '1px solid #e2e8f0', fontWeight: 'bold' }}>{formatCurrency(s.totalSpend)}</td>
                            </tr>
                         ))}
                      </tbody>
                   </table>
              </div>
              {/* --- END HIDDEN PDF REPORT TEMPLATE --- */}

              {/* UNIFIED SIDEBAR */}
              <aside className="w-64 bg-slate-900 text-slate-300 flex flex-col shrink-0 overflow-y-auto border-l border-slate-800">
                <div className="p-6 flex items-center space-x-3 space-x-reverse border-b border-slate-800 sticky top-0 bg-slate-900 z-10">
                  <FolderOpen className="w-8 h-8 text-white" />
                  <span className="text-xl font-bold text-white tracking-tight">FinIntel ERP</span>
                </div>
                
                <div className="flex-1 pb-6">
                    {/* Expenses Module Nav */}
                    <div className="p-4 uppercase text-[11px] font-black text-indigo-400 tracking-widest mt-2 flex items-center">
                        <ShoppingCart className="w-4 h-4 ml-2 opacity-70" /> المصروفات والموردين
                    </div>
                    <div className="px-3">
                        <NavItem mode="expenses" tab="upload" icon={UploadIcon} label="رفع ملف المشتريات" currentMode={appMode} currentTab={activeTab} onClick={handleNavClick} />
                        <NavItem mode="expenses" tab="dashboard" icon={BarChart3} label="لوحة القيادة" currentMode={appMode} currentTab={activeTab} onClick={handleNavClick} />
                        <NavItem mode="expenses" tab="categories_summary" icon={PieChart} label="ميزان المصروفات" currentMode={appMode} currentTab={activeTab} onClick={handleNavClick} />
                        <NavItem mode="expenses" tab="grouped_purchases" icon={Layers} label="سجل الموردين" currentMode={appMode} currentTab={activeTab} onClick={handleNavClick} />
                        <NavItem mode="expenses" tab="audit" icon={ShieldAlert} label="التناقضات والأخطاء" currentMode={appMode} currentTab={activeTab} onClick={handleNavClick} badge={appMode==='expenses' ? anomaliesCount : 0} />
                    </div>

                    {/* Revenues Module Nav */}
                    <div className="p-4 uppercase text-[11px] font-black text-emerald-400 tracking-widest mt-4 border-t border-slate-800/50 flex items-center">
                        <Wallet className="w-4 h-4 ml-2 opacity-70" /> الإيرادات والعملاء
                    </div>
                    <div className="px-3">
                        <NavItem mode="revenues" tab="upload" icon={UploadIcon} label="رفع ملف المبيعات" currentMode={appMode} currentTab={activeTab} onClick={handleNavClick} />
                        <NavItem mode="revenues" tab="dashboard" icon={BarChart3} label="لوحة القيادة" currentMode={appMode} currentTab={activeTab} onClick={handleNavClick} />
                        <NavItem mode="revenues" tab="categories_summary" icon={PieChart} label="ميزان الإيرادات" currentMode={appMode} currentTab={activeTab} onClick={handleNavClick} />
                        <NavItem mode="revenues" tab="grouped_purchases" icon={Layers} label="سجل العملاء" currentMode={appMode} currentTab={activeTab} onClick={handleNavClick} />
                        <NavItem mode="revenues" tab="audit" icon={ShieldAlert} label="التناقضات والأخطاء" currentMode={appMode} currentTab={activeTab} onClick={handleNavClick} badge={appMode==='revenues' ? anomaliesCount : 0} />
                    </div>

                    {/* Global Reports Module Nav */}
                    <div className="p-4 uppercase text-[11px] font-black text-amber-400 tracking-widest mt-4 border-t border-slate-800/50 flex items-center">
                        <BookOpen className="w-4 h-4 ml-2 opacity-70" /> التقارير الختامية
                    </div>
                    <div className="px-3">
                        <NavItem mode="reports" tab="income_statement" icon={FileText} label="قائمة الدخل (P&L)" currentMode={appMode} currentTab={activeTab} onClick={handleNavClick} />
                    </div>
                </div>
              </aside>

              {/* MAIN WORKSPACE */}
              <main className={`flex-1 flex flex-col h-screen overflow-hidden ${appMode === 'expenses' ? 'bg-slate-50' : (appMode === 'revenues' ? 'bg-emerald-50/20' : 'bg-amber-50/20')}`}>
                
                {/* UPLOAD SCREEN */}
                {activeTab === 'upload' && (
                  <div className="flex-1 flex flex-col items-center justify-center p-8 animate-in fade-in duration-300">
                    <div className="max-w-2xl w-full bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
                      <div className={`p-10 text-center ${appMode === 'expenses' ? 'bg-indigo-600' : 'bg-emerald-600'}`}>
                        <div className="inline-flex items-center justify-center p-5 bg-white/20 rounded-full mb-5 shadow-inner">
                          {appMode === 'expenses' ? <ShoppingCart className="w-12 h-12 text-white" /> : <Wallet className="w-12 h-12 text-white" />}
                        </div>
                        <h1 className="text-3xl font-extrabold text-white mb-3">
                            {appMode === 'expenses' ? 'قسم المشتريات والمصروفات' : 'قسم المبيعات والإيرادات'}
                        </h1>
                        <p className="text-white/80 font-medium text-lg">ارفع ملف الإكسيل ليقوم الذكاء الاصطناعي بتوجيهه محاسبياً</p>
                      </div>
                      <div className="p-10">
                        <div className={`border-2 border-dashed rounded-2xl p-12 text-center transition-all cursor-pointer relative ${appMode === 'expenses' ? 'border-indigo-300 hover:bg-indigo-50 hover:border-indigo-500' : 'border-emerald-300 hover:bg-emerald-50 hover:border-emerald-500'}`}>
                          <input type="file" accept=".xlsx, .xls, .csv" onChange={(e) => handleFileUpload(e, appMode)} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                          <UploadIcon className={`w-16 h-16 mx-auto mb-6 opacity-70 ${appMode === 'expenses' ? 'text-indigo-500' : 'text-emerald-500'}`} />
                          <h3 className="text-2xl font-bold text-slate-800 mb-2">اسحب وأفلت الملف هنا</h3>
                          <p className="text-slate-500 mb-6">أو انقر لاختيار ملف من جهازك (.xlsx, .csv)</p>
                          <button className={`text-white px-8 py-3 rounded-xl font-bold shadow-md ${appMode === 'expenses' ? 'bg-indigo-600' : 'bg-emerald-600'}`}>
                            استعراض الملفات
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* APP SCREENS WITH HEADER */}
                {activeTab !== 'upload' && (
                  <Fragment>
                    <header className="bg-white border-b border-slate-200 px-8 py-4 flex flex-col xl:flex-row items-center justify-between shadow-sm gap-4 shrink-0 z-10">
                      <div className="w-full xl:w-auto">
                        <h2 className="text-2xl font-extrabold text-slate-800 flex items-center">
                          {activeTab === 'dashboard' && 'ملخص التحليل العام'}
                          {activeTab === 'categories_summary' && `ميزان المراجعة لـ ${actLabel}`}
                          {activeTab === 'grouped_purchases' && `سجل ${actLabel} المجمع`}
                          {activeTab === 'audit' && 'التدقيق واكتشاف التناقضات'}
                          {activeTab === 'income_statement' && 'قائمة الدخل الاحترافية (P&L)'}
                          
                          {activeTab !== 'income_statement' ? (
                              <span className={`mr-3 px-2.5 py-0.5 text-xs font-black rounded-md ${appMode === 'expenses' ? 'bg-indigo-100 text-indigo-700' : 'bg-emerald-100 text-emerald-700'}`}>
                                  {appMode === 'expenses' ? 'المصروفات' : 'الإيرادات'}
                              </span>
                          ) : (
                              <span className="mr-3 px-2.5 py-0.5 text-xs font-black rounded-md bg-amber-100 text-amber-700">
                                  تقارير الإدارة العليا
                              </span>
                          )}
                        </h2>
                        {activeTab !== 'income_statement' ? (
                            <p className="text-sm text-slate-500 font-medium mt-1.5">
                              تم معالجة <strong className="text-slate-700">{filteredRecords.length.toLocaleString()}</strong> عملية لـ <strong className="text-slate-700">{filteredEntities.length}</strong> {entLabel} في هذه الفترة.
                            </p>
                        ) : (
                            <p className="text-sm text-slate-500 font-medium mt-1.5">
                              تدمج هذه القائمة بين <strong className="text-emerald-600">المبيعات</strong> و <strong className="text-indigo-600">المشتريات</strong> لاستخراج صافي الربح التشغيلي، ويتم حسابها بناءً على <strong className="text-slate-800">المبالغ الصافية فقط (بدون الضريبة)</strong> وفقاً للمعايير المحاسبية.
                            </p>
                        )}
                      </div>
                      
                      <div className="flex items-center flex-wrap justify-start xl:justify-end gap-3 w-full xl:w-auto">
                        {/* Month Filter */}
                        <div className={`flex items-center bg-white rounded-lg px-3 py-2 border shadow-sm transition-colors ${currentFilters.month ? (appMode==='expenses'?'border-indigo-400':'border-emerald-400') : 'border-slate-300'}`}>
                           <CalendarIcon className={`w-4 h-4 ml-2 ${appMode==='expenses'?'text-indigo-500':'text-emerald-500'}`} />
                           <input 
                             type="month" 
                             value={currentFilters.month} 
                             onChange={e => updateFilters({ month: e.target.value, start: '', end: '' })} 
                             className="bg-transparent outline-none cursor-pointer text-sm text-slate-700 font-bold" 
                             title="تصفية بشهر محدد"
                           />
                        </div>

                        {/* Date Range Filter */}
                        <div className={`flex items-center bg-white rounded-lg px-3 py-2 border shadow-sm transition-colors ${(currentFilters.start || currentFilters.end) ? (appMode==='expenses'?'border-indigo-400':'border-emerald-400') : 'border-slate-300'}`} title="تصفية بفترة مخصصة">
                           <div className="flex items-center space-x-1 space-x-reverse text-sm text-slate-700 font-medium">
                               <input type="date" value={currentFilters.start || ''} onChange={e=>updateFilters({ start: e.target.value, month: '' })} className="bg-transparent outline-none cursor-pointer" />
                               <span className="text-slate-300 mx-1">|</span>
                               <input type="date" value={currentFilters.end || ''} onChange={e=>updateFilters({ end: e.target.value, month: '' })} className="bg-transparent outline-none cursor-pointer" />
                           </div>
                        </div>

                        {/* Search Bar */}
                        <div className="relative">
                          <Search className="w-5 h-5 text-slate-400 absolute right-3 top-1/2 transform -translate-y-1/2" />
                          <input 
                            type="text" 
                            placeholder="بحث شامل..." 
                            value={currentFilters.search}
                            onChange={(e) => updateFilters({ search: e.target.value })}
                            className="pr-10 pl-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 w-48 xl:w-56 bg-white shadow-sm"
                          />
                        </div>
                        
                        {/* Export Dropdown Button */}
                        <div className="relative">
                          <button 
                            onClick={() => setExportMenuOpen(!exportMenuOpen)}
                            className={`flex items-center px-4 py-2 text-white rounded-lg font-bold shadow-md transition-colors text-sm ${appMode === 'expenses' ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-emerald-600 hover:bg-emerald-700'}`}
                          >
                            <Download className="w-4 h-4 ml-2" /> تصدير
                          </button>
                          
                          {exportMenuOpen && (
                            <div className="absolute left-0 mt-2 w-48 bg-white border border-slate-200 rounded-xl shadow-xl overflow-hidden z-50">
                              <button onClick={exportToExcel} className="w-full text-right px-4 py-3 text-sm font-bold text-slate-700 hover:bg-slate-50 hover:text-indigo-600 border-b border-slate-100 flex items-center">
                                 <FileSpreadsheet className="w-4 h-4 ml-2 text-emerald-600" /> استخراج Excel
                              </button>
                              <button onClick={exportToPDF} className="w-full text-right px-4 py-3 text-sm font-bold text-slate-700 hover:bg-slate-50 hover:text-red-600 flex items-center">
                                 <FileText className="w-4 h-4 ml-2 text-red-500" /> تقرير PDF مطبوع
                              </button>
                            </div>
                          )}
                        </div>
                      </div>
                    </header>

                    <div className="flex-1 overflow-y-auto p-6 md:p-8">
                      {/* DASHBOARD TAB */}
                      {activeTab === 'dashboard' && (
                        <div className="space-y-6 animate-in fade-in duration-300">
                          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            <Card title="الإجمالي الكلي (حسب التصفية)" value={formatCurrency(totalSpend)} icon={TrendingUp} color={appMode==='expenses'?'indigo':'emerald'} />
                            <Card title="الأساس الخاضع للضريبة" value={formatCurrency(totalTaxable)} icon={Layers} color="blue" />
                            <Card title="مبالغ غير خاضعة/معفاة" value={formatCurrency(totalNonTaxable)} icon={FileText} color="emerald" />
                            <Card title="إجمالي الضريبة المستخرجة" value={formatCurrency(totalVAT)} icon={Activity} color="indigo" />
                            <Card title={`إجمالي ${entsLabel} (المطابق)`} value={filteredEntities.length} subtitle="بعد التوحيد والدمج" icon={Users} color="blue" />
                            <Card title="تنبيهات محاسبية" value={anomaliesCount} subtitle="تتطلب المراجعة" icon={AlertTriangle} color={anomaliesCount > 0 ? "red" : "emerald"} />
                          </div>

                          <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center"><FileText className={`w-5 h-5 ml-2 ${appMode==='expenses'?'text-indigo-500':'text-emerald-500'}`}/> دقة الاستدلال الذكي للأعمدة</h3>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
                              <div className="p-3 bg-slate-50 rounded border border-slate-100"><span className="text-slate-500 block mb-1">{entLabel}:</span> <strong className="text-slate-800">{currentData.schema?.Entity_Name || 'تم الاستنتاج'}</strong></div>
                              <div className="p-3 bg-slate-50 rounded border border-slate-100"><span className="text-slate-500 block mb-1">البيان/الوصف:</span> <strong className="text-slate-800">{currentData.schema?.Item_Description || 'غير متوفر'}</strong></div>
                              <div className="p-3 bg-indigo-50/50 rounded border border-indigo-100"><span className="text-indigo-600 block mb-1">الرقم الضريبي:</span> <strong className="text-slate-800">{currentData.schema?.Entity_TaxID || 'لا يوجد'}</strong></div>
