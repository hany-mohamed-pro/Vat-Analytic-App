                              <div className="p-3 bg-blue-50/50 rounded border border-blue-100"><span className="text-blue-500 block mb-1">المبلغ الخاضع:</span> <strong className="text-slate-800">{currentData.schema?.Taxable_Amount || 'استنتاج آلي'}</strong></div>
                              <div className="p-3 bg-emerald-50/50 rounded border border-emerald-100"><span className="text-emerald-600 block mb-1">عمود بدون ضريبة:</span> <strong className="text-slate-800">{currentData.schema?.NonTaxable_Amount || 'استنتاج آلي'}</strong></div>
                              <div className="p-3 bg-slate-50 rounded border border-slate-100"><span className="text-slate-500 block mb-1">عمود الضريبة:</span> <strong className="text-slate-800">{currentData.schema?.VAT_Amount || 'لا يوجد'}</strong></div>
                              <div className="p-3 bg-slate-50 rounded border border-slate-100"><span className="text-slate-500 block mb-1">عمود الإجمالي:</span> <strong className="text-slate-800">{currentData.schema?.Total_Amount || 'لا يوجد'}</strong></div>
                              <div className="p-3 bg-slate-50 rounded border border-slate-100"><span className="text-slate-500 block mb-1">رقم المستند:</span> <strong className="text-slate-800">{currentData.schema?.Invoice_Number || 'لا يوجد'}</strong></div>
                            </div>
                          </div>
                        </div>
                      )}

                      {/* CATEGORIES SUMMARY TAB */}
                      {activeTab === 'categories_summary' && (
                        <div className="space-y-4 animate-in fade-in duration-300">
                          <div className={`bg-${appMode==='expenses'?'indigo':'emerald'}-50 text-${appMode==='expenses'?'indigo':'emerald'}-900 px-5 py-4 rounded-xl border border-${appMode==='expenses'?'indigo':'emerald'}-200 text-sm font-bold flex items-center mb-6 shadow-sm`}>
                            <Activity className="w-5 h-5 ml-3 shrink-0"/>
                            <span>ميزان المراجعة التحليلي: يُظهر إجمالي العمليات موزعة على التصنيفات المحاسبية (حساب رئيسي) ويندرج تحتها الجهات (حسابات فرعية). انقر للتوسيع والطي.</span>
                          </div>

                          {categoriesArray.length === 0 ? (
                            <div className="bg-white rounded-xl p-16 text-center text-slate-400 border border-slate-200">لا توجد بيانات متاحة للتصنيفات بهذه الفلاتر.</div>
                          ) : (
                            categoriesArray.map((cat, idx) => {
                              const isExpanded = expandedCategories[cat.name];
                              const isEditingGlobalCat = editSubCat.oldCat === cat.name && editSubCat.entId === 'GLOBAL';

                              return (
                                <div key={idx} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden transition-all duration-200 mb-5">
                                  <div 
                                    className={`p-5 flex flex-col lg:flex-row lg:items-center justify-between cursor-pointer transition-colors ${appMode==='expenses'?'bg-slate-800 hover:bg-slate-700':'bg-emerald-900 hover:bg-emerald-800'}`}
                                    onClick={() => toggleCategoryView(cat.name)}
                                  >
                                    <div className="flex items-center space-x-4 space-x-reverse mb-4 lg:mb-0 w-full lg:w-auto">
                                      <div className="bg-white/10 p-2 rounded-lg shrink-0 transition-transform">
                                        {isExpanded ? <ChevronUp className="w-5 h-5 text-white" /> : <ChevronDown className="w-5 h-5 text-white" />}
                                      </div>
                                      <div className="flex-1 min-w-0">
                                        <div className="flex items-center gap-3">
                                            {isEditingGlobalCat ? (
                                                <div className="flex items-center space-x-2 space-x-reverse" onClick={e => e.stopPropagation()}>
                                                    <input 
                                                      list="acc-categories"
                                                      className="text-sm text-slate-800 px-3 py-1.5 rounded border border-indigo-300 focus:outline-none focus:ring-2 focus:ring-emerald-500 w-64 shadow-inner"
                                                      value={editSubCat.value}
                                                      onChange={e => setEditSubCat({...editSubCat, value: e.target.value})}
                                                      autoFocus
                                                    />
                                                    <button onClick={(e) => {
                                                        e.stopPropagation();
                                                        if(editSubCat.value && editSubCat.value !== cat.name) {
                                                            handleSaveGlobalCategory(cat.name, editSubCat.value);
                                                        }
                                                        setEditSubCat({entId: null, oldCat: '', value: ''});
                                                    }} className="bg-emerald-500 text-white px-4 py-1.5 rounded text-sm font-bold shadow-md">حفظ</button>
                                                    <button onClick={(e) => { e.stopPropagation(); setEditSubCat({entId: null, oldCat: '', value: ''}); }} className="bg-white/20 text-white px-4 py-1.5 rounded text-sm font-bold hover:bg-white/30">إلغاء</button>
                                                </div>
                                            ) : (
                                                <Fragment>
                                                    <h3 className="font-bold text-xl text-white tracking-wide">{cat.name}</h3>
                                                    <button 
                                                       onClick={(e) => { e.stopPropagation(); setEditSubCat({ entId: 'GLOBAL', oldCat: cat.name, value: cat.name }); }}
                                                       className="text-white/50 hover:text-white bg-white/10 hover:bg-white/20 p-1.5 rounded-md transition-colors"
                                                       title="إعادة توجيه جميع فواتير هذا التصنيف"
                                                    >
                                                       <Edit2 className="w-4 h-4" />
                                                    </button>
                                                </Fragment>
                                            )}
                                        </div>
                                        <div className="text-white/80 text-sm mt-2 flex items-center flex-wrap gap-2">
                                          <span className="bg-white/10 px-3 py-1 rounded-md font-bold">{cat.invoiceCount} عملية مستخرجة</span>
                                        </div>
                                      </div>
                                    </div>
                                    <div className="flex flex-wrap gap-3 text-sm justify-center lg:justify-end shrink-0">
                                      <div className="bg-white/10 rounded-lg px-4 py-2 border border-white/5 text-center min-w-[120px]"><span className="block text-white/60 text-xs mb-1">الخاضع</span><strong className="font-bold text-white text-base">{formatCurrency(cat.totalTaxable)}</strong></div>
                                      <div className="bg-white/10 rounded-lg px-4 py-2 border border-white/5 text-center min-w-[120px]"><span className="block text-white/60 text-xs mb-1">غير خاضع</span><strong className="font-bold text-white text-base">{formatCurrency(cat.totalNonTaxable)}</strong></div>
                                      <div className="bg-white/10 rounded-lg px-4 py-2 border border-white/5 text-center min-w-[120px]"><span className="block text-white/60 text-xs mb-1">الضريبة</span><strong className="font-bold text-white text-base">{formatCurrency(cat.totalVAT)}</strong></div>
                                      <div className="bg-white/20 rounded-lg px-4 py-2 border border-white/20 text-center min-w-[140px] shadow-inner"><span className="block text-white/80 text-xs mb-1">الإجمالي</span><strong className="font-black text-green-400 text-base">{formatCurrency(cat.totalSpend)}</strong></div>
                                    </div>
                                  </div>

                                  {isExpanded && (() => {
                                      const groupedByEntity = cat.invoices.reduce((acc, inv) => {
                                          if (!acc[inv.Entity_ID]) {
                                              acc[inv.Entity_ID] = {
                                                  id: inv.Entity_ID,
                                                  name: inv.Entity_Normalized_Name,
                                                  taxId: inv.Entity_TaxID,
                                                  invoices: [],
                                                  totalTaxable: 0,
                                                  totalNonTaxable: 0,
                                                  totalVAT: 0,
                                                  totalSpend: 0
                                              };
                                          }
                                          acc[inv.Entity_ID].invoices.push(inv);
                                          acc[inv.Entity_ID].totalTaxable += inv.Taxable_Amount;
                                          acc[inv.Entity_ID].totalNonTaxable += inv.NonTaxable_Amount;
                                          acc[inv.Entity_ID].totalVAT += inv.VAT_Amount;
                                          acc[inv.Entity_ID].totalSpend += inv.Total_Amount;
                                          return acc;
                                      }, {});

                                      const entitiesList = Object.values(groupedByEntity).sort((a,b) => b.totalSpend - a.totalSpend);

                                      return (
                                          <div className="bg-slate-50 p-4 border-t border-slate-200">
                                              {entitiesList.map((ent, eIdx) => {
                                                  const subKey = `cat-${cat.name}-ent-${ent.id}`;
                                                  const isSubExpanded = !!expandedSubCats[subKey]; 

                                                  return (
                                                      <div key={eIdx} className="mb-4 last:mb-0 bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                                          <div 
                                                              className="px-5 py-3 flex justify-between items-center cursor-pointer hover:bg-slate-50 transition-colors border-b border-slate-100"
                                                              onClick={() => toggleSubCat(subKey)}
                                                          >
                                                              <div className="flex items-center gap-3">
                                                                  <div className="bg-slate-100 text-slate-500 p-1.5 rounded-lg transition-transform">
                                                                      {isSubExpanded ? <ChevronUp className="w-5 h-5" /> : <ChevronDown className="w-5 h-5" />}
                                                                  </div>
                                                                  <h4 className="font-bold text-slate-700 text-sm">{ent.name} <span className="text-slate-400 font-medium text-xs ml-1">(حساب فرعي / {entLabel})</span></h4>
                                                              </div>
                                                              <div className="hidden xl:flex items-center gap-4 mr-4 bg-slate-50 px-4 py-2 rounded-xl border border-slate-200 shadow-sm text-sm">
                                                                  <div className="flex flex-col items-center px-3 border-l border-slate-200 last:border-0">
                                                                      <span className="text-slate-500 text-xs font-bold mb-0.5">العمليات</span>
                                                                      <span className="font-black text-slate-800 text-base">{ent.invoices.length}</span>
                                                                  </div>
                                                                  <div className="flex flex-col items-center px-3 border-l border-slate-200 last:border-0">
                                                                      <span className="text-slate-500 text-xs font-bold mb-0.5">الخاضع</span>
                                                                      <span className="font-black text-blue-600 text-base" dir="ltr">{formatCurrency(ent.totalTaxable)}</span>
                                                                  </div>
                                                                  <div className="flex flex-col items-center px-3 border-l border-slate-200 last:border-0">
                                                                      <span className="text-slate-500 text-xs font-bold mb-0.5">غير خاضع</span>
                                                                      <span className="font-black text-emerald-600 text-base" dir="ltr">{formatCurrency(ent.totalNonTaxable)}</span>
                                                                  </div>
                                                                  <div className="flex flex-col items-center px-3 border-l border-slate-200 last:border-0">
                                                                      <span className="text-slate-500 text-xs font-bold mb-0.5">الضريبة</span>
                                                                      <span className="font-black text-slate-600 text-base" dir="ltr">{formatCurrency(ent.totalVAT)}</span>
                                                                  </div>
                                                                  <div className="flex flex-col items-center px-3">
                                                                      <span className="text-indigo-600 text-xs font-black mb-0.5">الإجمالي</span>
                                                                      <span className="font-black text-indigo-700 text-lg" dir="ltr">{formatCurrency(ent.totalSpend)}</span>
                                                                  </div>
                                                              </div>
                                                              <div className="xl:hidden flex items-center gap-2 text-xs font-bold mr-2">
                                                                  <span className="text-slate-600 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">{ent.invoices.length} فواتير</span>
                                                                  <span className="text-white bg-indigo-600 px-3 py-1.5 rounded-lg shadow-sm">{formatCurrency(ent.totalSpend)}</span>
                                                              </div>
                                                          </div>

                                                          {isSubExpanded && (
                                                              <div className="overflow-x-auto">
                                                                  <table className="w-full text-right text-sm">
                                                                      <thead className="bg-slate-50 text-slate-500 text-xs font-bold uppercase border-b border-slate-200">
                                                                          <tr>
                                                                              <th className="px-5 py-3 w-12 text-center">#</th>
                                                                              <th className="px-5 py-3">رقم المستند</th>
                                                                              <th className="px-5 py-3">البيان / الوصف</th>
                                                                              <th className="px-5 py-3">التاريخ</th>
                                                                              <th className="px-5 py-3 text-left">الخاضع</th>
                                                                              <th className="px-5 py-3 text-left">بدون ضريبة</th>
                                                                              <th className="px-5 py-3 text-left">الضريبة</th>
                                                                              <th className="px-5 py-3 text-left">الإجمالي</th>

                                                                                  <td className="px-5 py-3 text-left text-blue-600 font-bold" dir="ltr">{inv.Taxable_Amount > 0 ? formatCurrency(inv.Taxable_Amount) : '-'}</td>
                                                                                  <td className="px-5 py-3 text-left text-emerald-600 font-medium" dir="ltr">{inv.NonTaxable_Amount > 0 ? formatCurrency(inv.NonTaxable_Amount) : '-'}</td>
                                                                                  <td className="px-5 py-3 text-left text-slate-600" dir="ltr">{inv.VAT_Amount > 0 ? formatCurrency(inv.VAT_Amount) : '-'}</td>
                                                                                  <td className="px-5 py-3 text-left font-bold text-slate-900" dir="ltr">{formatCurrency(inv.Total_Amount)}</td>
                                                                              </tr>
                                                                          ))}
                                                                      </tbody>
                                                                  </table>
                                                              </div>
                                                          )}
                                                              </div>
                                                          );
                                                      })}
                                                  </div>
                                      );
                                  })()}
                                </div>
                              );
                            })
                          )}
                        </div>
                      )}

                      {/* GROUPED ENTITIES TAB (Target Design from Screenshot) */}
                      {activeTab === 'grouped_purchases' && (
                        <div className="space-y-4 animate-in fade-in duration-300">
                          <div className={`bg-${appMode==='expenses'?'indigo':'emerald'}-50 text-${appMode==='expenses'?'indigo':'emerald'}-900 px-5 py-4 rounded-xl border border-${appMode==='expenses'?'indigo':'emerald'}-200 text-sm font-bold flex items-center mb-6 shadow-sm`}>
                            <Activity className="w-5 h-5 ml-3 shrink-0"/>

                          {filteredEntities.length === 0 ? (
                            <div className="bg-white rounded-xl p-16 text-center text-slate-400 border border-slate-200">لا توجد نتائج تطابق بحثك بهذه الفلاتر.</div>

                            filteredEntities.map(sup => {
                              const supplierInvoices = filteredRecords.filter(r => r.Entity_ID === sup.id);
                              const isExpanded = expandedEntities[sup.id];
                              
                              return (
                                <div key={sup.id} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden transition-all duration-200 mb-5">

                                  <div 
                                    className="bg-[#1e293b] text-white p-5 flex flex-col xl:flex-row xl:items-center justify-between cursor-pointer"
                                    onClick={() => toggleEntity(sup.id)}
                                  >
                                    <div className="flex items-center justify-between xl:justify-start w-full xl:w-auto">
                                      <div className="flex items-center gap-4">
                                        <div className="bg-white/10 hover:bg-white/20 transition-colors p-2 rounded-lg shrink-0">
                                          {isExpanded ? <ChevronUp className="w-6 h-6 text-indigo-300" /> : <ChevronDown className="w-6 h-6 text-indigo-300" />}
                                        </div>
                                        <div className="flex-1">
                                          <h3 className="font-bold text-xl">{sup.name} <span className="text-sm font-normal text-slate-400 ml-2">(حساب رئيسي)</span></h3>
                                          <div className="flex items-center flex-wrap gap-3 text-xs text-slate-400 mt-2">
                                            <span>معرف: {sup.id}</span>
                                            {sup.taxId && <span>ضريبي: <span className="font-bold text-slate-300">{sup.taxId}</span></span>}
                                            <div className="flex items-center gap-2 border-r border-slate-600 pr-3">
                                              <Tag className="w-3 h-3 text-indigo-400" />
                                              {sup.categoriesArray.map((cat, idx) => (
                                                <span key={idx} className="bg-[#312e81] text-indigo-200 border border-indigo-500/30 px-3 py-1 rounded-full text-[11px] font-medium">
                                                  {cat}
                                                </span>
                                              ))}
                                            </div>
                                          </div>
                                        </div>
                                      </div>
                                    </div>
                                    
                                    {/* Stats Grid matching screenshot */}
                                    <div className="flex items-center justify-between xl:justify-end gap-6 mt-5 xl:mt-0 xl:pr-6 xl:border-r border-slate-700 w-full xl:w-auto overflow-x-auto pb-2 xl:pb-0">
                                      <div className="flex flex-col items-center">
                                          <span className="text-slate-400 text-[11px] font-bold mb-1">العمليات</span>
                                          <strong className="text-white text-lg font-bold">{sup.invoiceCount}</strong>
                                      </div>
                                      <div className="flex flex-col items-center">
                                          <span className="text-slate-400 text-[11px] font-bold mb-1">الخاضع للضريبة</span>
                                          <strong className="text-blue-400 text-lg font-bold" dir="ltr">{formatCurrency(sup.totalTaxableNet)}</strong>
                                      </div>
                                      <div className="flex flex-col items-center">
                                          <span className="text-slate-400 text-[11px] font-bold mb-1">غير خاضع</span>
                                          <strong className="text-emerald-400 text-lg font-bold" dir="ltr">{formatCurrency(sup.totalNonTaxableNet)}</strong>
                                      </div>
                                      <div className="flex flex-col items-center">
                                          <span className="text-slate-400 text-[11px] font-bold mb-1">الضريبة</span>
                                          <strong className="text-slate-200 text-lg font-bold" dir="ltr">{formatCurrency(sup.totalVAT)}</strong>
                                      </div>
                                      <div className="flex flex-col items-center border-r border-slate-600 pr-6 ml-2">
                                          <span className="text-slate-400 text-[11px] font-bold mb-1">إجمالي المستحق</span>
                                          <strong className="text-emerald-400 text-lg font-black tracking-wide" dir="ltr">{formatCurrency(sup.totalSpend)}</strong>
                                      </div>
                                    </div>
                                  </div>

                                  {/* --- SUB-CATEGORIES SECTION --- */}
                                  {isExpanded && (() => {
                                    const groupedByCategory = supplierInvoices.reduce((acc, inv) => {
                                        const cat = inv.Category || 'غير مصنف';
                                        if (!acc[cat]) acc[cat] = [];
                                        acc[cat].push(inv);
                                        return acc;
                                    }, {});

                                    return (
                                      <div className="bg-white p-4">
                                          {Object.entries(groupedByCategory).map(([categoryName, invoices], cIdx) => {
                                              const subCatKey = `${sup.id}-${categoryName}`;
                                              const isSubExpanded = !!expandedSubCats[subCatKey]; 

                                              const catTaxable = invoices.reduce((sum, inv) => sum + inv.Taxable_Amount, 0);
                                              const catNonTaxable = invoices.reduce((sum, inv) => sum + inv.NonTaxable_Amount, 0);
                                              const catVAT = invoices.reduce((sum, inv) => sum + inv.VAT_Amount, 0);
                                              const catTotal = invoices.reduce((sum, inv) => sum + inv.Total_Amount, 0);

                                              return (
                                                  <div key={cIdx} className="mb-6 last:mb-0 border border-slate-200 rounded-xl overflow-hidden">
                                                      
                                                      {/* Sub-Category Title Bar */}
                                                      <div 
                                                          className="bg-slate-50 border-b border-slate-200 px-5 py-3 flex justify-between items-center cursor-pointer hover:bg-slate-100 transition-colors"
                                                          onClick={() => toggleSubCat(subCatKey)}
                                                      >
                                                          <div className="flex items-center gap-3">
                                                              <div className="bg-indigo-100 text-indigo-600 p-1.5 rounded-lg transition-transform">
                                                                  {isSubExpanded ? <ChevronUp className="w-5 h-5" /> : <ChevronDown className="w-5 h-5" />}
                                                              </div>
                                                              <h4 className="font-bold text-indigo-800 text-sm">{categoryName} <span className="text-slate-500 font-medium text-xs ml-1">(حساب فرعي)</span></h4>
                                                              
                                                              <button 
                                                                 onClick={(e) => { e.stopPropagation(); setEditSubCat({ entId: sup.id, oldCat: categoryName, value: categoryName }); }}
                                                                 className="text-slate-400 hover:text-indigo-600 bg-white hover:bg-slate-100 p-1.5 rounded-md transition-colors border border-slate-200 mr-2 shadow-sm"
                                                                 title="تعديل التوجيه"
                                                              >
                                                                 <Edit2 className="w-3.5 h-3.5" />
                                                              </button>

                                                              {editSubCat.entId === sup.id && editSubCat.oldCat === categoryName && (
                                                                  <div className="flex items-center space-x-2 space-x-reverse mr-3" onClick={e => e.stopPropagation()}>
                                                                     <input 
                                                                       list="acc-categories"
                                                                       className="text-sm text-slate-800 px-3 py-1.5 rounded-lg border border-indigo-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 w-64 shadow-inner"
                                                                       value={editSubCat.value}
                                                                       onChange={e => setEditSubCat({...editSubCat, value: e.target.value})}
                                                                       autoFocus
                                                                     />
                                                                     <button onClick={(e) => handleSaveSubCategory(e, sup.id, categoryName)} className="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-sm font-bold hover:bg-indigo-700 shadow-sm">حفظ</button>
                                                                     <button onClick={(e) => { e.stopPropagation(); setEditSubCat({entId: null, oldCat: '', value: ''}); }} className="bg-slate-500 text-white px-4 py-1.5 rounded-lg text-sm font-bold hover:bg-slate-600 shadow-sm">إلغاء</button>
                                                                  </div>
                                                              )}
                                                          </div>
                                                          <div className="hidden xl:flex items-center gap-4 mr-4 bg-slate-50 px-4 py-2 rounded-xl border border-slate-200 shadow-sm text-sm">
                                                              <div className="flex flex-col items-center px-3 border-l border-slate-200 last:border-0">
                                                                  <span className="text-slate-500 text-xs font-bold mb-0.5">العمليات</span>
                                                                  <span className="font-black text-slate-800 text-base">{invoices.length}</span>
                                                              </div>
                                                              <div className="flex flex-col items-center px-3 border-l border-slate-200 last:border-0">
                                                                  <span className="text-slate-500 text-xs font-bold mb-0.5">الخاضع</span>
                                                                  <span className="font-black text-blue-600 text-base" dir="ltr">{formatCurrency(catTaxable)}</span>
                                                              </div>
                                                              <div className="flex flex-col items-center px-3 border-l border-slate-200 last:border-0">
                                                                  <span className="text-slate-500 text-xs font-bold mb-0.5">غير خاضع</span>
                                                                  <span className="font-black text-emerald-600 text-base" dir="ltr">{formatCurrency(catNonTaxable)}</span>
                                                              </div>
                                                              <div className="flex flex-col items-center px-3 border-l border-slate-200 last:border-0">
                                                                  <span className="text-slate-500 text-xs font-bold mb-0.5">الضريبة</span>
                                                                  <span className="font-black text-slate-600 text-base" dir="ltr">{formatCurrency(catVAT)}</span>
                                                              </div>
                                                              <div className="flex flex-col items-center px-3">
                                                                  <span className="text-indigo-600 text-xs font-black mb-0.5">الإجمالي</span>
                                                                  <span className="font-black text-indigo-700 text-lg" dir="ltr">{formatCurrency(catTotal)}</span>
                                                              </div>
                                                          </div>
                                                          <div className="xl:hidden flex items-center gap-2 text-xs font-bold mr-2">
                                                              <span className="text-slate-600 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">{invoices.length} فواتير</span>
                                                              <span className="text-white bg-indigo-600 px-3 py-1.5 rounded-lg shadow-sm">{formatCurrency(catTotal)}</span>
                                                          </div>
                                                      </div>
                                                      
                                                      {isSubExpanded && (
                                                        <Fragment>
                                                          {/* Table (Matching Screenshot) */}
                                                          <div className="overflow-x-auto bg-white p-4 pt-2">
                                                              <table className="w-full text-right text-sm">
                                                                <thead className="text-slate-400 text-xs border-b border-slate-200">
                                                                  <tr>
                                                                    <th className="py-3 font-medium text-center w-12">#</th>
                                                                    <th className="py-3 font-medium">رقم المستند</th>
                                                                    <th className="py-3 font-medium">البيان / الوصف</th>
                                                                    <th className="py-3 font-medium">التاريخ</th>
                                                                    <th className="py-3 font-medium text-left">المبلغ الخاضع</th>
                                                                    <th className="py-3 font-medium text-left">بدون ضريبة</th>
                                                                    <th className="py-3 font-medium text-left">قيمة الضريبة</th>
                                                                    <th className="py-3 font-medium text-left">إجمالي الفاتورة</th>
                                                                  </tr>
                                                                </thead>
                                                                <tbody>
                                                                  {invoices.map((inv, idx) => (
                                                                    <tr key={idx} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                                                      <td className="py-3 text-center text-slate-400">{idx + 1}</td>
                                                                      <td className="py-3 font-medium text-slate-700">{inv.Invoice_Number}</td>
                                                                      <td className="py-3 text-slate-800">
                                                                        <div className="font-medium max-w-[250px] truncate" title={inv.Item_Description}>{inv.Item_Description || '-'}</div>
                                                                      </td>
                                                                      <td className="py-3 text-slate-500 text-xs">{inv.Invoice_Date}</td>
                                                                      <td className="py-3 text-left text-blue-600 font-medium" dir="ltr">{inv.Taxable_Amount > 0 ? formatCurrency(inv.Taxable_Amount) : '-'}</td>
                                                                      <td className="py-3 text-left text-emerald-600 font-medium" dir="ltr">{inv.NonTaxable_Amount > 0 ? formatCurrency(inv.NonTaxable_Amount) : '-'}</td>
                                                                      <td className="py-3 text-left text-slate-500 font-medium" dir="ltr">{inv.VAT_Amount > 0 ? formatCurrency(inv.VAT_Amount) : '-'}</td>
                                                                      <td className="py-3 text-left font-bold text-slate-900" dir="ltr">{formatCurrency(inv.Total_Amount)}</td>
                                                                    </tr>
                                                                  ))}
                                                                </tbody>
                                                              </table>
                                                          </div>
                                                        </Fragment>
                                                      )}
                                                  </div>
                                              );
                                          })}
                                      </div>
                                    );
                                  })()}
                                </div>
                              );
                            })
                          )}
                        </div>
                      )}

                      {/* AUDIT / RAW DATA TAB */}
                      {activeTab === 'audit' && (
                        <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden animate-in fade-in duration-300">
                          <div className="bg-red-50 p-6 border-b border-red-100 flex items-start space-x-4 space-x-reverse">
                            <ShieldAlert className="w-8 h-8 text-red-600 shrink-0" />
                            <div>
                              <h4 className="text-red-800 font-black text-xl mb-1">سجل التناقضات والأخطاء المحاسبية</h4>
                              <p className="text-red-700/80 text-sm font-bold">يتم عرض السجلات التي تحتوي على أخطاء في الجمع (الخاضع + غير الخاضع + الضريبة لا يساوي الإجمالي) أو الفواتير المكررة لنفس الـ{entLabel}.</p>
                            </div>
                          </div>

                          <div className="overflow-x-auto">
                            <table className="w-full text-right text-sm">
                              <thead className="bg-slate-50 text-slate-600 text-xs font-black uppercase border-b border-slate-200">
                                <tr>
                                  <th className="px-6 py-4">رقم الفاتورة</th>
                                  <th className="px-6 py-4">{entLabel} / الجهة</th>
                                  <th className="px-6 py-4 text-left">الأساس الضريبي</th>
                                  <th className="px-6 py-4 text-left">الضريبة</th>
                                  <th className="px-6 py-4 text-left text-slate-800">الإجمالي (بالملف)</th>
                                  <th className="px-6 py-4">نوع الخطأ / الملاحظة</th>
                                </tr>
                              </thead>
                              <tbody className="divide-y divide-slate-100">
                                {filteredRecords.filter(r => r.Anomalies.length > 0).map((row, idx) => (
                                  <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                    <td className="px-6 py-4 font-bold text-slate-800">{row.Invoice_Number}</td>
                                    <td className="px-6 py-4">
                                      <div className="font-bold text-slate-800">{row.Entity_Normalized_Name}</div>
                                      {row.Entity_TaxID && <div className="text-[11px] font-bold text-slate-500 mt-1">ضريبي: {row.Entity_TaxID}</div>}
                                    </td>
                                    <td className="px-6 py-4 text-left font-medium">{formatCurrency(row.Net_Amount)}</td>
                                    <td className="px-6 py-4 text-left text-red-600 font-bold">{formatCurrency(row.VAT_Amount)}</td>
                                    <td className="px-6 py-4 text-left font-black text-slate-900">{formatCurrency(row.Total_Amount)}</td>
                                    <td className="px-6 py-4">
                                        <div className="flex flex-col space-y-2">
                                          {row.Anomalies.map((anom, i) => (
                                            <span key={i} className="inline-flex items-center text-xs font-bold text-red-700 bg-red-50 border border-red-200 px-3 py-1.5 rounded-lg shadow-sm">
                                              <AlertTriangle className="w-4 h-4 ml-2" /> {anom}
                                            </span>
                                          ))}
                                        </div>
                                    </td>
                                  </tr>
                                ))}
                                {filteredRecords.filter(r => r.Anomalies.length > 0).length === 0 && (
                                  <tr>
                                    <td colSpan="6" className="px-6 py-20 text-center text-slate-400">
                                      <CheckCircle className="w-16 h-16 text-emerald-400 mx-auto mb-4 opacity-50"/>
                                      <p className="text-xl font-bold">ممتاز! لا يوجد أي أخطاء أو تناقضات في العمليات المالية المفلترة.</p>
                                    </td>
                                  </tr>
                                )}
                              </tbody>
                            </table>
                          </div>
                        </div>
                      )}

                      {/* INCOME STATEMENT TAB (P&L) */}
                      {activeTab === 'income_statement' && (
                          <div className="max-w-5xl mx-auto space-y-6 animate-in fade-in duration-300 pb-10">
                              
                              {/* Financial Highlights */}
                              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                  <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                      <p className="text-slate-500 text-xs font-bold mb-1">إجمالي الإيرادات التشغيلية</p>
                                      <h3 className="text-2xl font-black text-emerald-600" dir="ltr">{formatCurrency(incomeStatement.totalRevenue)}</h3>
                                  </div>
                                  <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                      <p className="text-slate-500 text-xs font-bold mb-1">مجمل الربح (Gross Profit)</p>
                                      <h3 className="text-2xl font-black text-blue-600" dir="ltr">{formatCurrency(incomeStatement.grossProfit)}</h3>
                                      <p className="text-xs font-bold text-slate-400 mt-1 border-t border-slate-100 pt-1">هامش الربح: <span className={incomeStatement.grossMargin >= 0 ? 'text-emerald-500' : 'text-red-500'}>%{incomeStatement.grossMargin.toFixed(1)}</span></p>
                                  </div>
                                  <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                      <p className="text-slate-500 text-xs font-bold mb-1">إجمالي المصروفات (OPEX)</p>
                                      <h3 className="text-2xl font-black text-red-500" dir="ltr">{formatCurrency(incomeStatement.totalOPEX)}</h3>
                                  </div>
                                  <div className={`p-5 rounded-xl border shadow-md ${incomeStatement.netOperatingIncome >= 0 ? 'bg-indigo-600 border-indigo-700' : 'bg-red-600 border-red-700'}`}>
                                      <p className="text-white/80 text-xs font-bold mb-1">صافي الدخل التشغيلي</p>
                                      <h3 className="text-2xl font-black text-white" dir="ltr">{formatCurrency(incomeStatement.netOperatingIncome)}</h3>
                                      <p className="text-xs font-bold text-white/70 mt-1 border-t border-white/20 pt-1">هامش الصافي: <span className="text-white">%{incomeStatement.netMargin.toFixed(1)}</span></p>
                                  </div>
                              </div>

                              {/* The Income Statement Table */}
                              <div className="bg-white rounded-2xl border border-slate-200 shadow-lg overflow-hidden">
                                  
                                  {/* Revenues Section */}
                                  <div className="bg-emerald-50/50 px-6 py-3 border-b border-emerald-100">
                                      <h3 className="text-lg font-black text-emerald-800">الإيرادات التشغيلية (Revenues)</h3>
                                  </div>
                                  <div className="divide-y divide-slate-100">
                                      {incomeStatement.revBreakdown.map(([cat, amt], idx) => (
                                          <div key={idx} className="flex justify-between items-center px-6 py-3 hover:bg-slate-50 transition-colors text-sm">
                                              <span className="text-slate-700 font-medium">{cat}</span>
                                              <span className="text-slate-900 font-bold" dir="ltr">{formatCurrency(amt)}</span>
                                          </div>
                                      ))}
                                      {incomeStatement.revBreakdown.length === 0 && <div className="px-6 py-4 text-slate-400 text-sm text-center">لا توجد إيرادات مسجلة لهذه الفترة</div>}
                                      <div className="flex justify-between items-center px-6 py-4 bg-emerald-50 border-t border-emerald-200">
                                          <span className="text-emerald-900 font-black">إجمالي الإيرادات</span>
                                          <span className="text-emerald-700 font-black text-lg" dir="ltr">{formatCurrency(incomeStatement.totalRevenue)}</span>
                                      </div>
                                  </div>

                                  {/* COGS Section */}
                                  <div className="bg-red-50/50 px-6 py-3 border-b border-t border-red-100">
                                      <h3 className="text-lg font-black text-red-800">تكلفة المبيعات (Cost of Goods Sold)</h3>
                                  </div>
                                  <div className="divide-y divide-slate-100">
                                      {incomeStatement.cogsBreakdown.map(([cat, amt], idx) => (
                                          <div key={idx} className="flex justify-between items-center px-6 py-3 hover:bg-slate-50 transition-colors text-sm">
                                              <span className="text-slate-700 font-medium">{cat}</span>
                                              <span className="text-slate-900 font-bold" dir="ltr">{formatCurrency(amt)}</span>
                                          </div>
                                      ))}
                                      {incomeStatement.cogsBreakdown.length === 0 && <div className="px-6 py-4 text-slate-400 text-sm text-center">لا توجد تكلفة مبيعات مسجلة لهذه الفترة</div>}
                                      <div className="flex justify-between items-center px-6 py-4 bg-red-50 border-t border-red-200">
                                          <span className="text-red-900 font-black">إجمالي تكلفة المبيعات</span>
                                          <span className="text-red-700 font-black text-lg" dir="ltr">{formatCurrency(incomeStatement.totalCOGS)}</span>
                                      </div>
                                  </div>

                                  {/* Gross Profit Line */}
                                  <div className="flex justify-between items-center px-6 py-5 bg-slate-800 border-t-4 border-slate-900">
                                      <span className="text-white font-black text-lg">مجمل الربح (Gross Profit)</span>
                                      <span className="text-blue-400 font-black text-xl" dir="ltr">{formatCurrency(incomeStatement.grossProfit)}</span>
                                  </div>

                                  {/* OPEX Section */}
                                  <div className="bg-amber-50/50 px-6 py-3 border-b border-amber-100">
                                      <h3 className="text-lg font-black text-amber-800">المصروفات التشغيلية (Operating Expenses)</h3>
                                  </div>
                                  <div className="divide-y divide-slate-100">
                                      {incomeStatement.opexBreakdown.map(([cat, amt], idx) => (
                                          <div key={idx} className="flex justify-between items-center px-6 py-3 hover:bg-slate-50 transition-colors text-sm">
                                              <span className="text-slate-700 font-medium">{cat}</span>
                                              <span className="text-slate-900 font-bold" dir="ltr">{formatCurrency(amt)}</span>
                                          </div>
                                      ))}
                                      {incomeStatement.opexBreakdown.length === 0 && <div className="px-6 py-4 text-slate-400 text-sm text-center">لا توجد مصروفات تشغيلية مسجلة لهذه الفترة</div>}
                                      <div className="flex justify-between items-center px-6 py-4 bg-amber-50 border-t border-amber-200">
                                          <span className="text-amber-900 font-black">إجمالي المصروفات التشغيلية</span>
                                          <span className="text-amber-700 font-black text-lg" dir="ltr">{formatCurrency(incomeStatement.totalOPEX)}</span>
                                      </div>
                                  </div>

                                  {/* Net Income Line */}
                                  <div className="flex justify-between items-center px-6 py-6 bg-indigo-900 border-t-4 border-indigo-950">
                                      <div>
                                          <span className="text-white font-black text-xl block">صافي الدخل التشغيلي (EBITDA / Net Operating Income)</span>
                                          <span className="text-indigo-300 text-sm font-medium mt-1 block">الأرباح التشغيلية قبل الفوائد والضرائب والإهلاك</span>
                                      </div>
                                      <span className={incomeStatement.netOperatingIncome >= 0 ? "text-emerald-400 font-black text-3xl" : "text-red-400 font-black text-3xl"} dir="ltr">{formatCurrency(incomeStatement.netOperatingIncome)}</span>
                                  </div>
                              </div>
                              
                              {/* CAPEX Note */}
                              {incomeStatement.totalCAPEX > 0 && (
                                  <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center">
                                      <div className="flex items-center">
                                          <Layers className="w-5 h-5 text-slate-400 ml-3"/>
                                          <div>
                                              <h4 className="text-sm font-bold text-slate-700">المصروفات الرأسمالية (CAPEX)</h4>
                                              <p className="text-xs text-slate-500">تم استبعاد الأصول الثابتة من قائمة الدخل المباشرة وفقاً للمعايير المحاسبية.</p>
                                          </div>
                                      </div>
                                      <span className="font-bold text-slate-800 bg-slate-100 px-4 py-2 rounded-lg" dir="ltr">{formatCurrency(incomeStatement.totalCAPEX)}</span>
                                  </div>
                              )}
                          </div>
                      )}
                    </div>
                  </Fragment>
                )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
